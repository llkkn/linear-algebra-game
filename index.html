  if (phase === 0) {
    // Phase 0: Show original matrix
    const mx = ANIM_W / 2 - cs, my = 50;
    ctx.globalAlpha = ease;
    drawText(ctx, '原始矩阵', ANIM_W / 2 - 30, my - 16, '#fbbf24', 15);
    drawMatrix(ctx, M, mx, my, cs);
    ctx.globalAlpha = 1;
    caption.textContent = '展示原始矩阵';

  } else if (phase === 1) {
    // Phase 1: Highlight the rows involved
    const mx = ANIM_W / 2 - cs, my = 50;
    drawText(ctx, '原始矩阵', ANIM_W / 2 - 30, my - 16, '#fbbf24', 15);
    drawMatrix(ctx, M, mx, my, cs);

    // Highlight row 1 (source)
    if (ease > 0.1) {
      const alpha = Math.min(1, (ease - 0.1) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,212,255,0.3)';
      ctx.fillRect(mx, my, cs * 2, cs);
      drawText(ctx, 'r\u2081（源行）', mx + cs * 2 + 15, my + cs / 2, '#00d4ff', 13);
      ctx.globalAlpha = 1;
    }

    // Highlight row 2 (target)
    if (ease > 0.4) {
      const alpha = Math.min(1, (ease - 0.4) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(255,107,53,0.3)';
      ctx.fillRect(mx, my + cs, cs * 2, cs);
      drawText(ctx, 'r\u2082（目标行）', mx + cs * 2 + 15, my + cs * 1.5, '#ff6b35', 13);
      ctx.globalAlpha = 1;
    }

    if (ease > 0.7) {
      ctx.globalAlpha = (ease - 0.7) / 0.3;
      drawText(ctx, '操作：r\u2082 - 2r\u2081', ANIM_W / 2 - 50, my + cs * 2 + 25, '#ffcc00', 16);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '高亮要变换的行：r\u2082 - 2r\u2081';

  } else if (phase === 2) {
    // Phase 2: Animate the transformation
    const mx = ANIM_W / 2 - cs, my = 50;
    drawText(ctx, '原始矩阵', ANIM_W / 2 - 30, my - 16, '#fbbf24', 15);
    drawMatrix(ctx, M, mx, my, cs);

    // Show computation
    if (ease > 0.1) {
      ctx.globalAlpha = Math.min(1, (ease - 0.1) / 0.3);
      drawText(ctx, '新r\u2082 = r\u2082 - 2\u00d7r\u2081', 30, my + cs * 2 + 20, '#ff6b35', 14);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.3) {
      ctx.globalAlpha = Math.min(1, (ease - 0.3) / 0.2);
      drawText(ctx, '[2, 7] - 2\u00d7[1, 3]', 30, my + cs * 2 + 45, '#e0e6ff', 14);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.5) {
      ctx.globalAlpha = Math.min(1, (ease - 0.5) / 0.2);
      drawText(ctx, '= [2-2, 7-6]', 30, my + cs * 2 + 70, '#e0e6ff', 14);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.7) {
      const alpha = Math.min(1, (ease - 0.7) / 0.3);
      ctx.globalAlpha = alpha;
      drawText(ctx, '= [0, 1]', 30, my + cs * 2 + 95, '#00ff88', 16);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '计算变换过程';

  } else if (phase === 3) {
    // Phase 3: Show result matrix
    const mx = ANIM_W / 2 - cs, my = 50;
    drawText(ctx, '变换结果', ANIM_W / 2 - 30, my - 16, '#fbbf24', 15);

    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
    const scale = 0.8 + 0.2 * easeOutBounce(Math.min(1, t / 0.5));
    ctx.save();
    ctx.translate(ANIM_W / 2, my + cs);
    ctx.scale(scale, scale);
    ctx.translate(-ANIM_W / 2, -(my + cs));
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 15 * pulse;
    drawMatrix(ctx, result, mx, my, cs);
    ctx.shadowBlur = 0;
    ctx.restore();

    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, 'r\u2082 变为 [0, 1]，变换完成！', ANIM_W / 2 - 80, my + cs * 2 + 25, '#00ff88', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '变换后的结果矩阵';

  } else {
    // Phase 4: Show row echelon form concept
    const cs2 = 32;
    const mx = ANIM_W / 2 - cs2 * 1.5, my = 25;
    drawText(ctx, '行阶梯形', ANIM_W / 2 - 30, my - 16, '#fbbf24', 15);

    const ref = [[1,2,3,4],[0,1,2,3],[0,0,1,2],[0,0,0,0]];
    drawMatrix(ctx, ref, mx, my, cs2);

    // Highlight pivots
    if (ease > 0.2) {
      const alpha = Math.min(1, (ease - 0.2) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(255,204,0,0.3)';
      ctx.fillRect(mx, my, cs2, cs2);
      ctx.fillRect(mx + cs2, my + cs2, cs2, cs2);
      ctx.fillRect(mx + cs2 * 2, my + cs2 * 2, cs2, cs2);
      // Pivot markers
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 14px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u2605', mx + cs2 / 2, my + cs2 / 2);
      ctx.fillText('\u2605', mx + cs2 * 1.5, my + cs2 * 1.5);
      ctx.fillText('\u2605', mx + cs2 * 2.5, my + cs2 * 2.5);
      ctx.globalAlpha = 1;
    }

    // Highlight zero row
    if (ease > 0.4) {
      const alpha = Math.min(1, (ease - 0.4) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(255,51,102,0.15)';
      ctx.fillRect(mx, my + cs2 * 3, cs2 * 4, cs2);
      ctx.globalAlpha = 1;
    }

    if (ease > 0.6) {
      ctx.globalAlpha = (ease - 0.6) / 0.4;
      drawText(ctx, '主元(\u2605)逐行右移，零行在最下方', ANIM_W / 2 - 110, my + cs2 * 4 + 15, '#00ff88', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '行阶梯形：主元逐行右移';
  }
}

// --- Linear Equations Generation ---
function genEquation(cat) {
  let n, A, x, b, answer;
  let attempts = 0;

  if (cat === 'tutorial' || cat === 'beginner') {
    // 2x2 system with integer solutions
    n = 2;
    do {
      x = [randInt(-5, 5), randInt(-5, 5)];
      A = [[randInt(-5, 5), randInt(-5, 5)], [randInt(-5, 5), randInt(-5, 5)]];
      const d = det2(A[0][0], A[0][1], A[1][0], A[1][1]);
      if (d === 0) { attempts++; continue; }
      b = [A[0][0]*x[0] + A[0][1]*x[1], A[1][0]*x[0] + A[1][1]*x[1]];
      attempts++;
    } while (attempts < 200 && (Math.abs(b[0]) > 30 || Math.abs(b[1]) > 30));
    answer = x;
  } else if (cat === 'intermediate') {
    // 3x3 system with integer solutions
    n = 3;
    do {
      x = [randInt(-3, 3), randInt(-3, 3), randInt(-3, 3)];
      A = [];
      for (let i = 0; i < 3; i++) {
        A[i] = [randInt(-4, 4), randInt(-4, 4), randInt(-4, 4)];
      }
      const d = det3(A);
      if (d === 0) { attempts++; continue; }
      b = [];
      for (let i = 0; i < 3; i++) {
        b[i] = A[i][0]*x[0] + A[i][1]*x[1] + A[i][2]*x[2];
      }
      attempts++;
    } while (attempts < 200 && b.some(v => Math.abs(v) > 30));
    answer = x;
  } else {
    // 3x3 system, solutions may be fractions, round to 1 decimal
    n = 3;
    do {
      x = [];
      for (let i = 0; i < 3; i++) {
        x[i] = Math.round((randInt(-20, 20) / 2)) / 2; // half-integer solutions
      }
      A = [];
      for (let i = 0; i < 3; i++) {
        A[i] = [randInt(-4, 4), randInt(-4, 4), randInt(-4, 4)];
      }
      const d = det3(A);
      if (d === 0) { attempts++; continue; }
      b = [];
      for (let i = 0; i < 3; i++) {
        b[i] = A[i][0]*x[0] + A[i][1]*x[1] + A[i][2]*x[2];
      }
      attempts++;
    } while (attempts < 200 && b.some(v => Math.abs(v) > 40));
    answer = x.map(v => Math.round(v * 10) / 10);
  }

  const vars = n === 2 ? ['x', 'y'] : ['x', 'y', 'z'];
  return { type: 'equation', A, b, answer, n, vars };
}

// --- Elementary Row Operations Generation ---
function genElementary(cat) {
  let rows, cols, valRange;
  if (cat === 'tutorial') { rows = 2; cols = 2; valRange = 3; }
  else if (cat === 'beginner') { rows = 2; cols = 2; valRange = 4; }
  else if (cat === 'intermediate') { rows = Math.random() < 0.5 ? 2 : 3; cols = rows === 2 ? 3 : 3; valRange = 4; }
  else { rows = 3; cols = 3; valRange = 5; }

  const matrix = [];
  for (let i = 0; i < rows; i++) {
    matrix[i] = [];
    for (let j = 0; j < cols; j++) {
      matrix[i][j] = randInt(-valRange, valRange);
    }
  }

  const k = randChoice([-3,-2,-1,1,2,3]);
  const targetIdx = randInt(0, rows - 1);
  let sourceIdx;
  do { sourceIdx = randInt(0, rows - 1); } while (sourceIdx === targetIdx);
  const operation = { type: 'add', targetRow: targetIdx, sourceRow: sourceIdx, k: k };

  const answer = matrix.map(r => [...r]);
  for (let j = 0; j < cols; j++) {
    answer[targetIdx][j] = matrix[targetIdx][j] + k * matrix[sourceIdx][j];
  }

  return { type: 'elementary', matrix, operation, answer, targetRow: targetIdx, rows, cols };
}

// --- Render Linear Equations ---
function renderEquation(q, area) {
  const { A, b, n, vars } = q;
  let html = `<div class="problem-statement">求解线性方程组</div>`;

  // Display equations
  html += `<div style="font-family:'JetBrains Mono',monospace;font-size:1rem;text-align:center;margin:8px 0;line-height:2">`;
  for (let i = 0; i < n; i++) {
    let eq = '';
    for (let j = 0; j < n; j++) {
      const coeff = A[i][j];
      if (j === 0) {
        if (coeff === 1) eq += vars[j];
        else if (coeff === -1) eq += '-' + vars[j];
        else eq += coeff + vars[j];
      } else {
        if (coeff > 0) eq += ' + ' + (coeff === 1 ? '' : coeff) + vars[j];
        else if (coeff < 0) eq += ' - ' + (coeff === -1 ? '' : Math.abs(coeff)) + vars[j];
      }
    }
    eq += ' = ' + b[i];
    html += `<div>${eq}</div>`;
  }
  html += `</div>`;

  // Matrix form
  html += `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0">`;
  html += createMatrixHTML(A);
  html += `<span style="font-family:'JetBrains Mono',monospace;color:var(--text-dim);font-size:1.2rem">[`;
  for (let i = 0; i < n; i++) {
    if (i > 0) html += ', ';
    html += vars[i];
  }
  html += `]</span>`;
  html += `<span class="op">=</span>`;
  // b vector as column
  html += `<div class="matrix-display" style="grid-template-columns:1fr">`;
  for (let i = 0; i < n; i++) {
    html += `<div class="matrix-cell">${b[i]}</div>`;
  }
  html += `</div>`;
  html += `</div>`;

  // Input fields for each variable
  html += `<div style="display:flex;gap:15px;align-items:center;justify-content:center;margin:10px 0;flex-wrap:wrap">`;
  for (let i = 0; i < n; i++) {
    html += `<label style="font-size:0.95rem;color:var(--text-dim)">${vars[i]} = <input type="text" class="answer-input" data-r="${i}" autocomplete="off" style="width:80px"></label>`;
  }
  html += `</div>`;

  const tolerance = (q.n === 3 && state.currentCategory === 'advanced') ? '0.1' : '0.01';
  html += `<div style="font-size:0.8rem;color:var(--text-dim);margin:5px 0">`;
  if (q.n === 3 && state.currentCategory === 'advanced') {
    html += `提示：答案可能含小数，四舍五入到1位小数`;
  }
  html += `</div>`;

  html += `<div class="btn-group"><button class="btn btn-success" onclick="checkEquation()">提交答案</button></div>`;
  area.innerHTML = html;

  const firstInput = area.querySelector('input');
  if (firstInput) setTimeout(() => firstInput.focus(), 100);
  setupInputNavigation(area);
}

// --- Render Elementary Row Operations ---
function renderElementary(q, area) {
  const { matrix, operation, answer, targetRow, rows, cols } = q;
  const op = operation;

  // Build operation description
  let opDesc = '';
  const rowLabels = ['r\u2081', 'r\u2082', 'r\u2083'];
  if (op.type === 'add') {
    if (op.k === 1) {
      opDesc = `${rowLabels[op.targetRow]} + ${rowLabels[op.sourceRow]}`;
    } else if (op.k === -1) {
      opDesc = `${rowLabels[op.targetRow]} - ${rowLabels[op.sourceRow]}`;
    } else if (op.k > 0) {
      opDesc = `${rowLabels[op.targetRow]} + ${op.k}${rowLabels[op.sourceRow]}`;
    } else {
      opDesc = `${rowLabels[op.targetRow]} - ${Math.abs(op.k)}${rowLabels[op.sourceRow]}`;
    }
  }

  let html = `<div class="problem-statement">对矩阵执行初等行变换</div>`;
  html += `<div style="font-family:'JetBrains Mono',monospace;font-size:1.1rem;text-align:center;margin:8px 0;color:var(--warning)">${opDesc}</div>`;

  // Show original matrix
  html += `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center">`;
  html += createMatrixHTML(matrix);
  html += `<span class="op" style="font-size:1.5rem">\u2192</span>`;

  // Result matrix with input cells only for target row
  const inputCells = [];
  for (let i = 0; i < rows; i++) {
    inputCells[i] = [];
    for (let j = 0; j < cols; j++) {
      inputCells[i][j] = (i === targetRow);
    }
  }
  html += createMatrixHTML(answer, inputCells);
  html += `</div>`;

  html += `<div style="font-size:0.8rem;color:var(--text-dim);margin:5px 0">填写变换后第${targetRow + 1}行的值</div>`;
  html += `<div class="btn-group"><button class="btn btn-success" onclick="checkElementary()">提交答案</button></div>`;
  area.innerHTML = html;
  setupInputNavigation(area);
}

// --- Check Linear Equations ---
function checkEquation() {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  const inputs = document.querySelectorAll('#gameArea input[data-r]');
  let allCorrect = true;
  const tolerance = (q.n === 3 && state.currentCategory === 'advanced') ? 0.15 : 0.01;

  inputs.forEach(inp => {
    const idx = parseInt(inp.dataset.r);
    const val = parseFloat(inp.value);
    const correct = q.answer[idx];
    if (isNaN(val) || Math.abs(val - correct) > tolerance) {
      allCorrect = false;
      inp.classList.add('wrong');
      inp.value = correct;
    } else {
      inp.classList.add('correct');
    }
  });
  state.answered = true;
  processAnswer(allCorrect, q);
}

// --- Check Elementary Row Operations ---
function checkElementary() {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  const { allCorrect } = checkMatrixInputs(q, 0.5, true);
  state.answered = true;
  processAnswer(allCorrect, q);
}

// ==================== BACKGROUND ANIMATION ====================
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles_bg = [];
let gridOffset = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Create background particles
for (let i = 0; i < 50; i++) {
  particles_bg.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    size: Math.random() * 2 + 0.5,
    alpha: Math.random() * 0.5 + 0.1,
  });
}

function drawBackground() {
  if (document.hidden) { requestAnimationFrame(drawBackground); return; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw grid
  ctx.strokeStyle = 'rgba(0,212,255,0.04)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  gridOffset = (gridOffset + 0.15) % gridSize;
  for (let x = gridOffset; x < canvas.width; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = gridOffset; y < canvas.height; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Draw particles
  particles_bg.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,212,255,${p.alpha})`;
    ctx.fill();
  });

  // Draw connections
  ctx.strokeStyle = 'rgba(0,212,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < particles_bg.length; i++) {
    for (let j = i + 1; j < particles_bg.length; j++) {
      const dx = particles_bg[i].x - particles_bg[j].x;
      const dy = particles_bg[i].y - particles_bg[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles_bg[i].x, particles_bg[i].y);
        ctx.lineTo(particles_bg[j].x, particles_bg[j].y);
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(drawBackground);
}
drawBackground();
