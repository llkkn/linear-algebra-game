// ==================== TUTORIAL CANVAS ANIMATION ====================
let animFrame = null;
let animPhase = 0;
let animTimer = null;
let currentAnimMode = null;
let animCanvas, animCtx;
let animDPR = 1;
let animCaptionEl = null;
let phaseStartTime = 0;
const ANIM_W = 480, ANIM_H = 280;
let isPaused = false;
let isPlaying = false;
let pausedPhase = 0;
let pausedTime = 0;

// Easing functions
function easeInOut(t) {
  return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
}
function easeOutBounce(t) {
  if (t < 1/2.75) return 7.5625*t*t;
  else if (t < 2/2.75) { t -= 1.5/2.75; return 7.5625*t*t + 0.75; }
  else if (t < 2.5/2.75) { t -= 2.25/2.75; return 7.5625*t*t + 0.9375; }
  else { t -= 2.625/2.75; return 7.5625*t*t + 0.984375; }
}
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeInCubic(t) { return t * t * t; }

function setupAnimCanvas() {
  animCanvas = document.getElementById('animCanvas');
  animCtx = animCanvas.getContext('2d');
  animCaptionEl = document.getElementById('animCaption');
  animDPR = window.devicePixelRatio || 1;
  animCanvas.width = ANIM_W * animDPR;
  animCanvas.height = ANIM_H * animDPR;
  animCanvas.style.width = ANIM_W + 'px';
  animCanvas.style.height = ANIM_H + 'px';
  animCtx.setTransform(animDPR, 0, 0, animDPR, 0, 0);
}

function togglePause() {
  try {
  if (!isPlaying) {
    // Not started yet, play
    playAnimation();
    return;
  }
  if (isPaused) {
    // Resume
    isPaused = false;
    document.getElementById('animPlayBtn').textContent = '暂停';
    // Restore phaseStartTime to account for paused time
    phaseStartTime = Date.now() - pausedTime;
    // Restart the animation loop
    function animLoop() {
      if (!currentAnimMode || isPaused) return;
      animCtx.clearRect(0, 0, ANIM_W, ANIM_H);
      drawAnimPhase(animPhase);
      animFrame = requestAnimationFrame(animLoop);
    }
    animLoop();
    // Restart the phase timer
    const remainingTime = 2500 - pausedTime;
    animTimer = setTimeout(() => {
      if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
      animPhase++;
      runAnimPhase();
    }, remainingTime);
  } else {
    // Pause
    isPaused = true;
    pausedTime = Date.now() - phaseStartTime;
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    if (animTimer) { clearTimeout(animTimer); animTimer = null; }
    document.getElementById('animPlayBtn').textContent = '继续';
  }
  } catch(e) { console.error('togglePause error:', e); }
}

function playAnimation() {
  try {
  stopAnimation();
  isPaused = false;
  isPlaying = true;
  pausedTime = 0;
  animPhase = 0;
  document.getElementById('animPlayBtn').textContent = '暂停';
  runAnimPhase();
  } catch(e) { console.error('playAnimation error:', e); }
}

function resetAnimation() {
  stopAnimation();
  isPaused = false;
  pausedTime = 0;
  pausedPhase = 0;
  animPhase = 0;
  document.getElementById('animPlayBtn').textContent = '播放演示';
  animCaptionEl.textContent = '';
  if (animCtx) {
    animCtx.clearRect(0, 0, ANIM_W, ANIM_H);
    drawAnimPhase(0);
  }
}

function stopAnimation() {
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  isPaused = false;
  isPlaying = false;
  pausedTime = 0;
  const btn = document.getElementById('animPlayBtn');
  if (btn) { btn.textContent = '播放演示'; }
}

function runAnimPhase() {
  try {
  if (!currentAnimMode) return;
  const maxPhases = { multiplication: 5, determinant: 5, linearDep: 5, inverse: 5, eigenvalue: 5, transpose: 5, symmetry: 5, rank: 5, equation: 5, elementary: 5 };
  const max = maxPhases[currentAnimMode] || 5;
  if (animPhase >= max) {
    stopAnimation();
    return;
  }
  phaseStartTime = Date.now();
  // Use requestAnimationFrame for smooth animation within each phase
  function animLoop() {
    if (!currentAnimMode || isPaused) return;
    animCtx.clearRect(0, 0, ANIM_W, ANIM_H);
    drawAnimPhase(animPhase);
    animFrame = requestAnimationFrame(animLoop);
  }
  animLoop();
  // Move to next phase after 2.5 seconds
  animTimer = setTimeout(() => {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    animPhase++;
    runAnimPhase();
  }, 2500);
  } catch(e) { console.error('runAnimPhase error:', e); }
}

function drawAnimPhase(phase) {
  try {
  if (!animCtx) return;
  animCtx.clearRect(0, 0, ANIM_W, ANIM_H);
  switch (currentAnimMode) {
    case 'multiplication': drawMultiplicationAnim(phase); break;
    case 'determinant': drawDeterminantAnim(phase); break;
    case 'linearDep': drawLinearDepAnim(phase); break;
    case 'inverse': drawInverseAnim(phase); break;
    case 'eigenvalue': drawEigenvalueAnim(phase); break;
    case 'transpose': drawTransposeAnim(phase); break;
    case 'symmetry': drawSymmetryAnim(phase); break;
    case 'rank': drawRankAnim(phase); break;
    case 'equation': drawEquationAnim(phase); break;
    case 'elementary': drawElementaryAnim(phase); break;
  }
  } catch(e) { console.error('drawAnimPhase error:', e); }
}

// ===== Animation 1: Matrix Multiplication =====
function drawMultiplicationAnim(phase) {
  const ctx = animCtx;
  const A = [[1,2],[0,1]];
  const B = [[3,0],[1,2]];
  const C = [[5,4],[1,2]];
  const cellSz = 32;
  const ax = 30, ay = 55;
  const bx = 170, by = 55;
  const cx = 330, cy = 55;
  const t = Math.min(1, (Date.now() - phaseStartTime) / 2200);
  const ease = easeInOut(t);

  const caption = animCaptionEl;

  // Computation data for each result cell: [row, col, formula, result]
  const computations = [
    { r: 0, c: 0, formula: '1\u00d73+2\u00d71=5', result: 5 },
    { r: 0, c: 1, formula: '1\u00d70+2\u00d72=4', result: 4 },
    { r: 1, c: 0, formula: '0\u00d73+1\u00d71=1', result: 1 },
    { r: 1, c: 1, formula: '0\u00d70+1\u00d72=2', result: 2 },
  ];

  if (phase === 0) {
    // Phase 0: Matrix A slides in from left, Matrix B slides in from right
    const slideA = -120 * (1 - ease);
    const slideB = 120 * (1 - ease);
    const alphaA = ease;
    const alphaB = ease;

    ctx.globalAlpha = alphaA;
    drawText(ctx, '矩阵 A', ax + cellSz + slideA, ay - 12, '#00d4ff', 14);
    drawMatrix(ctx, A, ax + slideA, ay, cellSz);
    ctx.globalAlpha = 1;

    // Multiplication sign fades in
    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, '\u00d7', ax + cellSz * 2 + 20, ay + cellSz + 4, '#ff6b35', 22);
      ctx.globalAlpha = 1;
    }

    ctx.globalAlpha = alphaB;
    drawText(ctx, '矩阵 B', bx + cellSz + slideB, by - 12, '#00d4ff', 14);
    drawMatrix(ctx, B, bx + slideB, by, cellSz);
    ctx.globalAlpha = 1;

    // Equals sign
    if (ease > 0.7) {
      ctx.globalAlpha = (ease - 0.7) / 0.3;
      drawText(ctx, '=', bx + cellSz * 2 + 20, by + cellSz + 4, '#ff6b35', 22);
      drawText(ctx, '结果', cx + cellSz, cy - 12, '#ffcc00', 14);
      // Draw empty result matrix
      drawResultMatrixEmpty(ctx, cx, cy, cellSz);
      ctx.globalAlpha = 1;
    }

    caption.textContent = '展示矩阵 A 和 B';

  } else if (phase >= 1 && phase <= 4) {
    // Phases 1-4: Compute each result cell
    const compIdx = phase - 1;
    const comp = computations[compIdx];

    // Always draw A, B, and result matrix
    drawText(ctx, '矩阵 A', ax + cellSz, ay - 12, '#00d4ff', 14);
    drawMatrix(ctx, A, ax, ay, cellSz);
    drawText(ctx, '\u00d7', ax + cellSz * 2 + 20, ay + cellSz + 4, '#ff6b35', 22);
    drawText(ctx, '矩阵 B', bx + cellSz, by - 12, '#00d4ff', 14);
    drawMatrix(ctx, B, bx, by, cellSz);
    drawText(ctx, '=', bx + cellSz * 2 + 20, by + cellSz + 4, '#ff6b35', 22);
    drawText(ctx, '结果', cx + cellSz, cy - 12, '#ffcc00', 14);

    // Draw result matrix with previously filled cells
    const filled = [];
    for (let i = 0; i < compIdx; i++) filled.push([computations[i].r, computations[i].c]);
    drawResultMatrix(ctx, C, cx, cy, cellSz, filled, phase);

    // Sub-phase within each computation phase:
    // t 0.0-0.3: Highlight A's row (orange sweep from left to right)
    // t 0.3-0.6: Highlight B's column (cyan sweep from top to bottom)
    // t 0.6-0.85: Connecting lines with bezier curves and flowing dash
    // t 0.85-1.0: Result drops into cell with bounce

    if (t < 0.3) {
      // Highlight A's row with sweep
      const st = t / 0.3;
      const se = easeInOut(st);
      drawHighlightRowSweep(ctx, ax, ay, cellSz, comp.r, se, 'rgba(255,107,53,');
      // Text "取A的第X行"
      ctx.globalAlpha = se;
      drawText(ctx, '取A的第' + (comp.r + 1) + '行', ax, ay + cellSz * 2 + 20, '#ff6b35', 14);
      ctx.globalAlpha = 1;
    } else if (t < 0.6) {
      // Keep A row highlighted
      drawHighlightRow(ctx, ax, ay, cellSz, comp.r, 'rgba(255,107,53,0.3)');
      // Highlight B's column with sweep
      const st = (t - 0.3) / 0.3;
      const se = easeInOut(st);
      drawHighlightColSweep(ctx, bx, by, cellSz, comp.c, se, 'rgba(0,212,255,');
      ctx.globalAlpha = se;
      drawText(ctx, '取B的第' + (comp.c + 1) + '列', bx, by + cellSz * 2 + 20, '#00d4ff', 14);
      ctx.globalAlpha = 1;
    } else if (t < 0.85) {
      // Keep highlights
      drawHighlightRow(ctx, ax, ay, cellSz, comp.r, 'rgba(255,107,53,0.3)');
      drawHighlightCol(ctx, bx, by, cellSz, comp.c, 'rgba(0,212,255,0.3)');
      // Connecting bezier curves with flowing dash
      const st = (t - 0.6) / 0.25;
      const se = easeInOut(st);
      drawConnectingBezier(ctx, ax, ay, bx, by, cellSz, comp.r, comp.c, se);
      // Show formula
      ctx.globalAlpha = se;
      drawText(ctx, comp.formula, ANIM_W / 2 - 80, ANIM_H - 22, '#00ff88', 15);
      ctx.globalAlpha = 1;
    } else {
      // Keep highlights
      drawHighlightRow(ctx, ax, ay, cellSz, comp.r, 'rgba(255,107,53,0.2)');
      drawHighlightCol(ctx, bx, by, cellSz, comp.c, 'rgba(0,212,255,0.2)');
      drawConnectingBezier(ctx, ax, ay, bx, by, cellSz, comp.r, comp.c, 1);
      // Result number drops into cell with bounce
      const st = (t - 0.85) / 0.15;
      const bounce = easeOutBounce(st);
      const rcx = cx + comp.c * cellSz + cellSz / 2;
      const rcy = cy + comp.r * cellSz + cellSz / 2;
      const startY = rcy - 40;
      const curY = startY + (rcy - startY) * bounce;
      const scale = 0.5 + 0.5 * bounce;

      ctx.save();
      ctx.translate(rcx, curY);
      ctx.scale(scale, scale);
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 10 * bounce;
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(comp.result, 0, 0);
      ctx.restore();

      // Formula text
      ctx.globalAlpha = 1;
      drawText(ctx, comp.formula, ANIM_W / 2 - 80, ANIM_H - 22, '#00ff88', 15);
    }

    caption.textContent = '计算 C[' + (comp.r+1) + '][' + (comp.c+1) + '] = ' + comp.formula;

  } else {
    // Phase 5: Final result with glow pulse
    drawText(ctx, '矩阵 A', ax + cellSz, ay - 12, '#00d4ff', 14);
    drawMatrix(ctx, A, ax, ay, cellSz);
    drawText(ctx, '\u00d7', ax + cellSz * 2 + 20, ay + cellSz + 4, '#ff6b35', 22);
    drawText(ctx, '矩阵 B', bx + cellSz, by - 12, '#00d4ff', 14);
    drawMatrix(ctx, B, bx, by, cellSz);
    drawText(ctx, '=', bx + cellSz * 2 + 20, by + cellSz + 4, '#ff6b35', 22);
    drawText(ctx, '结果', cx + cellSz, cy - 12, '#ffcc00', 14);

    // All cells filled with glow pulse
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 15 * pulse;
    drawResultMatrixAllFilled(ctx, C, cx, cy, cellSz, pulse);
    ctx.shadowBlur = 0;

    drawText(ctx, '计算完成！', ANIM_W / 2 - 40, ANIM_H - 22, '#ffcc00', 16);
    caption.textContent = '矩阵乘法完成！';
  }
}

function drawHighlightRowSweep(ctx, mx, my, cs, row, progress, colorBase) {
  const sweepWidth = cs * 2 * progress;
  const grad = ctx.createLinearGradient(mx, my, mx + sweepWidth, my);
  grad.addColorStop(0, colorBase + '0.0)');
  grad.addColorStop(0.7, colorBase + '0.25)');
  grad.addColorStop(1, colorBase + '0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(mx, my + row * cs, sweepWidth, cs);
}

function drawHighlightColSweep(ctx, mx, my, cs, col, progress, colorBase) {
  const sweepHeight = cs * 2 * progress;
  const grad = ctx.createLinearGradient(mx, my, mx, my + sweepHeight);
  grad.addColorStop(0, colorBase + '0.0)');
  grad.addColorStop(0.7, colorBase + '0.25)');
  grad.addColorStop(1, colorBase + '0.5)');
  ctx.fillStyle = grad;
  ctx.fillRect(mx + col * cs, my, cs, sweepHeight);
}

function drawConnectingBezier(ctx, ax, ay, bx, by, cs, row, col, progress) {
  ctx.strokeStyle = 'rgba(255,204,0,0.6)';
  ctx.lineWidth = 1.5;
  const dashOffset = -Date.now() / 80;
  ctx.setLineDash([5, 4]);
  ctx.lineDashOffset = dashOffset;
  for (let k = 0; k < 2; k++) {
    const x1 = ax + k * cs + cs / 2;
    const y1 = ay + row * cs + cs / 2;
    const x2 = bx + col * cs + cs / 2;
    const y2 = by + k * cs + cs / 2;
    const cpx = (x1 + x2) / 2;
    const cpy = (y1 + y2) / 2 - 20;
    ctx.beginPath();
    if (progress < 0.5) {
      // Draw first half of bezier
      const pt = progress * 2;
      const steps = Math.floor(pt * 20);
      for (let s = 0; s <= steps; s++) {
        const st = s / 20;
        const px = (1-st)*(1-st)*x1 + 2*(1-st)*st*cpx + st*st*x2;
        const py = (1-st)*(1-st)*y1 + 2*(1-st)*st*cpy + st*st*y2;
        if (s === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
    } else {
      ctx.moveTo(x1, y1);
      ctx.quadraticCurveTo(cpx, cpy, x2, y2);
    }
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.lineDashOffset = 0;
}

function drawResultMatrixEmpty(ctx, x, y, cs) {
  const rows = 2, cols = 2;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 6, y - 4); ctx.lineTo(x - 10, y - 4);
  ctx.lineTo(x - 10, y + rows * cs + 4); ctx.lineTo(x - 6, y + rows * cs + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + cols * cs + 6, y - 4); ctx.lineTo(x + cols * cs + 10, y - 4);
  ctx.lineTo(x + cols * cs + 10, y + rows * cs + 4); ctx.lineTo(x + cols * cs + 6, y + rows * cs + 4);
  ctx.stroke();
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cx = x + j * cs + cs / 2;
      const cy = y + i * cs + cs / 2;
      ctx.fillStyle = 'rgba(255,204,0,0.2)';
      ctx.font = '16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', cx, cy);
    }
  }
}

function drawResultMatrixAllFilled(ctx, matrix, x, y, cs, pulse) {
  const rows = matrix.length, cols = matrix[0].length;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 6, y - 4); ctx.lineTo(x - 10, y - 4);
  ctx.lineTo(x - 10, y + rows * cs + 4); ctx.lineTo(x - 6, y + rows * cs + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + cols * cs + 6, y - 4); ctx.lineTo(x + cols * cs + 10, y - 4);
  ctx.lineTo(x + cols * cs + 10, y + rows * cs + 4); ctx.lineTo(x + cols * cs + 6, y + rows * cs + 4);
  ctx.stroke();
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cx = x + j * cs + cs / 2;
      const cy = y + i * cs + cs / 2;
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(matrix[i][j], cx, cy);
    }
  }
}

// Keep original helper functions for other animations
function drawHighlightRow(ctx, mx, my, cs, row, color) {
  ctx.fillStyle = color;
  ctx.fillRect(mx, my + row * cs, cs * 2, cs);
}

function drawHighlightCol(ctx, mx, my, cs, col, color) {
  ctx.fillStyle = color;
  ctx.fillRect(mx + col * cs, my, cs, cs * 2);
}

function drawResultMatrix(ctx, matrix, x, y, cs, filled, phase) {
  const rows = matrix.length, cols = matrix[0].length;
  ctx.strokeStyle = '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 6, y - 4); ctx.lineTo(x - 10, y - 4);
  ctx.lineTo(x - 10, y + rows * cs + 4); ctx.lineTo(x - 6, y + rows * cs + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + cols * cs + 6, y - 4); ctx.lineTo(x + cols * cs + 10, y - 4);
  ctx.lineTo(x + cols * cs + 10, y + rows * cs + 4); ctx.lineTo(x + cols * cs + 6, y + rows * cs + 4);
  ctx.stroke();
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cx = x + j * cs + cs / 2;
      const cy = y + i * cs + cs / 2;
      const isFilled = filled.some(f => f[0] === i && f[1] === j);
      if (isFilled) {
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 16px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(matrix[i][j], cx, cy);
      } else {
        ctx.fillStyle = 'rgba(255,204,0,0.2)';
        ctx.font = '16px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', cx, cy);
      }
    }
  }
}

// ===== Animation 2: Determinant =====
function drawDeterminantAnim(phase) {
  const ctx = animCtx;
  const M = [[3,1],[2,4]];
  const cs = 44;
  const mx = ANIM_W / 2 - cs, my = 40;
  const t = Math.min(1, (Date.now() - phaseStartTime) / 2200);
  const ease = easeInOut(t);

  const caption = animCaptionEl;

  if (phase === 0) {
    // Phase 0: Matrix scales in from center with bounce
    const scale = easeOutBounce(Math.min(1, t / 0.8));
    ctx.save();
    ctx.translate(ANIM_W / 2, my + cs);
    ctx.scale(scale, scale);
    ctx.translate(-ANIM_W / 2, -(my + cs));
    drawText(ctx, '矩阵 A', ANIM_W / 2, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, M, mx, my, cs);
    ctx.restore();
    caption.textContent = '展示矩阵';

  } else if (phase === 1) {
    // Phase 1: Main diagonal "brush" effect from top-left to bottom-right
    drawText(ctx, '矩阵 A', ANIM_W / 2, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, M, mx, my, cs);

    // Glow on diagonal elements
    if (ease > 0.2) {
      const glowAlpha = Math.min(1, (ease - 0.2) / 0.3);
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 15 * glowAlpha;
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 18px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(M[0][0], mx + cs / 2, my + cs / 2);
      ctx.fillText(M[1][1], mx + cs * 1.5, my + cs * 1.5);
      ctx.shadowBlur = 0;
    }

    // Main diagonal line drawn progressively (brush effect)
    const lineProgress = Math.min(1, ease * 1.3);
    const x1 = mx + 6, y1 = my + 6;
    const x2 = mx + cs * 2 - 6, y2 = my + cs * 2 - 6;
    const curX = x1 + (x2 - x1) * lineProgress;
    const curY = y1 + (y2 - y1) * lineProgress;

    ctx.strokeStyle = '#00ff88';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#00ff88';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(curX, curY);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Formula text fades in
    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, '主对角线: 3 \u00d7 4 = 12', ANIM_W / 2 - 80, my + cs * 2 + 30, '#00ff88', 16);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '主对角线（绿色）3 \u00d7 4 = 12';

  } else if (phase === 2) {
    // Phase 2: Anti-diagonal "brush" effect from top-right to bottom-left
    drawText(ctx, '矩阵 A', ANIM_W / 2, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, M, mx, my, cs);

    // Dimmed main diagonal
    ctx.strokeStyle = 'rgba(0,255,136,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(mx + 6, my + 6);
    ctx.lineTo(mx + cs * 2 - 6, my + cs * 2 - 6);
    ctx.stroke();

    // Glow on anti-diagonal elements
    if (ease > 0.2) {
      const glowAlpha = Math.min(1, (ease - 0.2) / 0.3);
      ctx.shadowColor = '#ff3366';
      ctx.shadowBlur = 15 * glowAlpha;
      ctx.fillStyle = '#ff3366';
      ctx.font = 'bold 18px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(M[0][1], mx + cs * 1.5, my + cs / 2);
      ctx.fillText(M[1][0], mx + cs / 2, my + cs * 1.5);
      ctx.shadowBlur = 0;
    }

    // Anti-diagonal line drawn progressively
    const lineProgress = Math.min(1, ease * 1.3);
    const x1 = mx + cs * 2 - 6, y1 = my + 6;
    const x2 = mx + 6, y2 = my + cs * 2 - 6;
    const curX = x1 + (x2 - x1) * lineProgress;
    const curY = y1 + (y2 - y1) * lineProgress;

    ctx.strokeStyle = '#ff3366';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#ff3366';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(curX, curY);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Text
    if (ease > 0.4) {
      ctx.globalAlpha = Math.min(1, (ease - 0.4) * 2.5);
      drawText(ctx, '主对角线: 3 \u00d7 4 = 12', ANIM_W / 2 - 80, my + cs * 2 + 30, 'rgba(0,255,136,0.6)', 14);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, '副对角线: 1 \u00d7 2 = 2', ANIM_W / 2 - 80, my + cs * 2 + 52, '#ff3366', 16);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '副对角线（红色）1 \u00d7 2 = 2';

  } else if (phase === 3) {
    // Phase 3: Subtraction with sequential fade-in
    // Dimmed diagonals
    ctx.strokeStyle = 'rgba(0,255,136,0.2)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(mx + 6, my + 6); ctx.lineTo(mx + cs * 2 - 6, my + cs * 2 - 6); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,51,102,0.2)';
    ctx.beginPath(); ctx.moveTo(mx + cs * 2 - 6, my + 6); ctx.lineTo(mx + 6, my + cs * 2 - 6); ctx.stroke();

    drawText(ctx, '矩阵 A', ANIM_W / 2, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, M, mx, my, cs);

    // "12" fades in
    if (ease > 0.1) {
      ctx.globalAlpha = Math.min(1, (ease - 0.1) / 0.3);
      drawText(ctx, '12', ANIM_W / 2 - 60, my + cs * 2 + 40, '#00ff88', 22);
      ctx.globalAlpha = 1;
    }
    // " - " fades in
    if (ease > 0.35) {
      ctx.globalAlpha = Math.min(1, (ease - 0.35) / 0.2);
      drawText(ctx, ' - ', ANIM_W / 2 - 30, my + cs * 2 + 40, '#e0e6ff', 22);
      ctx.globalAlpha = 1;
    }
    // "2" fades in
    if (ease > 0.5) {
      ctx.globalAlpha = Math.min(1, (ease - 0.5) / 0.2);
      drawText(ctx, '2', ANIM_W / 2, my + cs * 2 + 40, '#ff3366', 22);
      ctx.globalAlpha = 1;
    }
    // " = 10" fades in
    if (ease > 0.7) {
      ctx.globalAlpha = Math.min(1, (ease - 0.7) / 0.3);
      drawText(ctx, ' = 10', ANIM_W / 2 + 15, my + cs * 2 + 40, '#ffcc00', 22);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '行列式 = 12 - 2 = 10';

  } else {
    // Phase 4: Result "10" with glow pulse and scale-up
    ctx.strokeStyle = 'rgba(0,255,136,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(mx + 6, my + 6); ctx.lineTo(mx + cs * 2 - 6, my + cs * 2 - 6); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,51,102,0.15)';
    ctx.beginPath(); ctx.moveTo(mx + cs * 2 - 6, my + 6); ctx.lineTo(mx + 6, my + cs * 2 - 6); ctx.stroke();

    drawText(ctx, '矩阵 A', ANIM_W / 2, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, M, mx, my, cs);

    // Big result with scale animation and glow pulse
    const scale = 0.5 + 0.5 * easeOutBounce(Math.min(1, t / 0.6));
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);

    ctx.save();
    ctx.translate(ANIM_W / 2, my + cs * 2 + 55);
    ctx.scale(scale, scale);
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 20 * pulse;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 28px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('|A| = 10', 0, 0);
    ctx.restore();

    caption.textContent = '行列式 |A| = 10';
  }
}

// ===== Animation 3: Linear Dependence =====
function drawLinearDepAnim(phase) {
  const ctx = animCtx;
  const caption = animCaptionEl;
  const W = ANIM_W, H = ANIM_H;

  // Use progress within phase for smooth animation
  const t = Math.min(1, (Date.now() - phaseStartTime) / 1500);
  const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut

  if (phase === 0) {
    // Phase 0: Draw coordinate grid with animation
    const ox = 180, oy = 190, scale = 50;

    // Grid lines (fade in)
    ctx.globalAlpha = ease;
    ctx.strokeStyle = 'rgba(224,230,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = -3; i <= 5; i++) {
      ctx.beginPath(); ctx.moveTo(ox + i*scale, 30); ctx.lineTo(ox + i*scale, H-30); ctx.stroke();
    }
    for (let i = -2; i <= 4; i++) {
      ctx.beginPath(); ctx.moveTo(30, oy - i*scale); ctx.lineTo(W-30, oy - i*scale); ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = 'rgba(224,230,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(30, oy); ctx.lineTo(W-30, oy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox, 30); ctx.lineTo(ox, H-30); ctx.stroke();

    // Arrow tips on axes
    ctx.fillStyle = 'rgba(224,230,255,0.4)';
    ctx.beginPath(); ctx.moveTo(W-30,oy); ctx.lineTo(W-38,oy-5); ctx.lineTo(W-38,oy+5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(ox,30); ctx.lineTo(ox-5,38); ctx.lineTo(ox+5,38); ctx.fill();

    // Labels
    drawText(ctx, 'x', W-22, oy-10, 'rgba(224,230,255,0.6)', 14);
    drawText(ctx, 'y', ox+10, 28, 'rgba(224,230,255,0.6)', 14);
    drawText(ctx, 'O', ox-14, oy+14, 'rgba(224,230,255,0.3)', 12);

    // Tick marks
    for (let i = -2; i <= 4; i++) {
      if (i === 0) continue;
      ctx.fillStyle = 'rgba(224,230,255,0.3)';
      ctx.font = '11px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.fillText(i, ox + i*scale, oy + 16);
      ctx.strokeStyle = 'rgba(224,230,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(ox+i*scale, oy-4); ctx.lineTo(ox+i*scale, oy+4); ctx.stroke();
    }
    for (let i = -1; i <= 3; i++) {
      if (i === 0) continue;
      ctx.fillStyle = 'rgba(224,230,255,0.3)';
      ctx.font = '11px "JetBrains Mono"';
      ctx.textAlign = 'right';
      ctx.fillText(i, ox-10, oy-i*scale+4);
      ctx.strokeStyle = 'rgba(224,230,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(ox-4, oy-i*scale); ctx.lineTo(ox+4, oy-i*scale); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    caption.textContent = '建立一个二维坐标系';

  } else if (phase === 1) {
    // Phase 1: Draw vector a = [1, 2] with animation
    const ox = 180, oy = 190, scale = 50;
    drawGrid(ctx, ox, oy, scale, W, H);

    const ax = ox + 1*scale*ease, ay = oy - 2*scale*ease;

    // Glow effect
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 12;
    drawFatVectorArrow(ctx, ox, oy, ax, ay, '#00d4ff', 3.5);
    ctx.shadowBlur = 0;

    // Label
    if (ease > 0.5) {
      ctx.globalAlpha = (ease-0.5)*2;
      drawText(ctx, 'a = [1, 2]', ax+14, ay-6, '#00d4ff', 15);
      // Dotted projection lines
      ctx.strokeStyle = 'rgba(0,212,255,0.3)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax, oy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ox, ay); ctx.stroke();
      ctx.setLineDash([]);
      // Projection labels
      drawText(ctx, '1', ax-4, oy+16, 'rgba(0,212,255,0.5)', 11);
      drawText(ctx, '2', ox-16, ay+4, 'rgba(0,212,255,0.5)', 11);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '画出向量 a = [1, 2]（蓝色箭头）';

  } else if (phase === 2) {
    // Phase 2: Draw vector b = [2, 4] and show it's 2a
    const ox = 180, oy = 190, scale = 50;
    drawGrid(ctx, ox, oy, scale, W, H);

    // Vector a (dimmed)
    drawFatVectorArrow(ctx, ox, oy, ox+1*scale, oy-2*scale, 'rgba(0,212,255,0.4)', 2.5);
    drawText(ctx, 'a', ox+1*scale+10, oy-2*scale-8, 'rgba(0,212,255,0.5)', 13);

    // Vector b (animated)
    const bx = ox + 2*scale*ease, by = oy - 4*scale*ease;
    ctx.shadowColor = '#ff6b35';
    ctx.shadowBlur = 12;
    drawFatVectorArrow(ctx, ox, oy, bx, by, '#ff6b35', 3.5);
    ctx.shadowBlur = 0;

    if (ease > 0.5) {
      ctx.globalAlpha = (ease-0.5)*2;
      drawText(ctx, 'b = [2, 4]', bx+14, by-6, '#ff6b35', 15);

      // Show "b = 2a" with scaling animation
      const textScale = 0.5 + ease*0.5;
      ctx.save();
      ctx.translate(W/2, 28);
      ctx.scale(textScale, textScale);
      drawText(ctx, 'b = 2 × a', -40, 0, '#ffcc00', 20);
      ctx.restore();
      ctx.globalAlpha = 1;
    }
    caption.textContent = '画出向量 b = [2, 4]，发现 b = 2a！';

  } else if (phase === 3) {
    // Phase 3: Show they are on the same line - linear dependent
    const ox = 180, oy = 190, scale = 50;
    drawGrid(ctx, ox, oy, scale, W, H);

    // Extended line (dashed)
    ctx.strokeStyle = 'rgba(255,107,53,0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 5]);
    ctx.beginPath();
    ctx.moveTo(ox - 0.5*scale, oy + 1*scale);
    ctx.lineTo(ox + 3*scale, oy - 6*scale);
    ctx.stroke();
    ctx.setLineDash([]);

    // Vector a
    drawFatVectorArrow(ctx, ox, oy, ox+1*scale, oy-2*scale, '#00d4ff', 3);
    drawText(ctx, 'a', ox+1*scale+10, oy-2*scale-8, '#00d4ff', 13);

    // Vector b with pulse
    const pulse = 1 + 0.05*Math.sin(Date.now()/200);
    ctx.shadowColor = '#ff6b35';
    ctx.shadowBlur = 15;
    drawFatVectorArrow(ctx, ox, oy, ox+2*scale, oy-4*scale, '#ff6b35', 3.5*pulse);
    ctx.shadowBlur = 0;
    drawText(ctx, 'b = 2a', ox+2*scale+14, oy-4*scale-6, '#ff6b35', 14);

    // "2a" annotation along the vector
    if (ease > 0.3) {
      ctx.globalAlpha = Math.min(1, (ease-0.3)*2);
      // Draw small a vector at midpoint, then another
      const mx = ox + 1*scale, my = oy - 2*scale;
      ctx.strokeStyle = 'rgba(0,212,255,0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([3,3]);
      drawFatVectorArrow(ctx, ox, oy, mx, my, 'rgba(0,212,255,0.5)', 2);
      drawFatVectorArrow(ctx, mx, my, ox+2*scale, oy-4*scale, 'rgba(0,212,255,0.5)', 2);
      ctx.setLineDash([]);
      drawText(ctx, 'a', mx-20, my-10, 'rgba(0,212,255,0.7)', 12);
      drawText(ctx, '+a', mx+16, my-20, 'rgba(0,212,255,0.7)', 12);
      ctx.globalAlpha = 1;
    }

    // Result text
    drawText(ctx, '两向量在同一直线上 → 线性相关！', 40, H-20, '#ff3366', 15);
    caption.textContent = 'b 可以由 a "拼" 出来（b = 2a），所以线性相关！';

  } else if (phase === 4) {
    // Phase 4: Contrast - independent vectors
    const ox = 180, oy = 190, scale = 50;
    drawGrid(ctx, ox, oy, scale, W, H);

    // Vector a = [1, 0] along x-axis
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 10;
    drawFatVectorArrow(ctx, ox, oy, ox+2*scale*ease, oy, '#00d4ff', 3.5);
    ctx.shadowBlur = 0;

    if (ease > 0.4) {
      const ease2 = Math.min(1, (ease-0.4)/0.6);
      // Vector b = [0, 1] along y-axis
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 10;
      drawFatVectorArrow(ctx, ox, oy, ox, oy-2*scale*ease2, '#00ff88', 3.5);
      ctx.shadowBlur = 0;

      if (ease2 > 0.5) {
        ctx.globalAlpha = (ease2-0.5)*2;
        drawText(ctx, 'a = [1, 0]', ox+2*scale+10, oy+4, '#00d4ff', 14);
        drawText(ctx, 'b = [0, 1]', ox+10, oy-2*scale-8, '#00ff88', 14);

        // Angle arc between vectors
        ctx.strokeStyle = 'rgba(255,204,0,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(ox, oy, 25, -Math.PI/2, 0);
        ctx.stroke();
        drawText(ctx, '90°', ox+28, oy-12, '#ffcc00', 12);
        ctx.globalAlpha = 1;
      }
    }

    if (ease > 0.8) {
      ctx.globalAlpha = (ease-0.8)*5;
      drawText(ctx, '两向量不在同一直线上 → 线性无关！', 30, H-20, '#00ff88', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '对比：a=[1,0] 和 b=[0,1] 互相无法替代，线性无关！';
  }
}

function drawGrid(ctx, ox, oy, scale, W, H) {
  // Grid
  ctx.strokeStyle = 'rgba(224,230,255,0.06)';
  ctx.lineWidth = 1;
  for (let i = -3; i <= 5; i++) {
    ctx.beginPath(); ctx.moveTo(ox+i*scale, 30); ctx.lineTo(ox+i*scale, H-30); ctx.stroke();
  }
  for (let i = -2; i <= 4; i++) {
    ctx.beginPath(); ctx.moveTo(30, oy-i*scale); ctx.lineTo(W-30, oy-i*scale); ctx.stroke();
  }
  // Axes
  ctx.strokeStyle = 'rgba(224,230,255,0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(30, oy); ctx.lineTo(W-30, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, 30); ctx.lineTo(ox, H-30); ctx.stroke();
  // Arrow tips
  ctx.fillStyle = 'rgba(224,230,255,0.3)';
  ctx.beginPath(); ctx.moveTo(W-30,oy); ctx.lineTo(W-36,oy-4); ctx.lineTo(W-36,oy+4); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ox,30); ctx.lineTo(ox-4,36); ctx.lineTo(ox+4,36); ctx.fill();
  // Labels
  drawText(ctx, 'x', W-22, oy-8, 'rgba(224,230,255,0.4)', 12);
  drawText(ctx, 'y', ox+8, 28, 'rgba(224,230,255,0.4)', 12);
  drawText(ctx, 'O', ox-12, oy+14, 'rgba(224,230,255,0.2)', 11);
  // Ticks
  for (let i = -2; i <= 4; i++) {
    if (i===0) continue;
    ctx.fillStyle = 'rgba(224,230,255,0.25)';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(i, ox+i*scale, oy+14);
  }
  for (let i = -1; i <= 3; i++) {
    if (i===0) continue;
    ctx.fillStyle = 'rgba(224,230,255,0.25)';
    ctx.font = '10px "JetBrains Mono"';
    ctx.textAlign = 'right';
    ctx.fillText(i, ox-8, oy-i*scale+4);
  }
}

function drawFatVectorArrow(ctx, x1, y1, x2, y2, color, width) {
  const angle = Math.atan2(y2-y1, x2-x1);
  const headLen = 14;

  // Shaft with gradient
  ctx.strokeStyle = color;
  ctx.lineWidth = width || 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2 - headLen*0.6*Math.cos(angle), y2 - headLen*0.6*Math.sin(angle));
  ctx.stroke();

  // Arrowhead (filled triangle)
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen*Math.cos(angle-0.35), y2 - headLen*Math.sin(angle-0.35));
  ctx.lineTo(x2 - headLen*0.6*Math.cos(angle), y2 - headLen*0.6*Math.sin(angle));
  ctx.lineTo(x2 - headLen*Math.cos(angle+0.35), y2 - headLen*Math.sin(angle+0.35));
  ctx.closePath();
  ctx.fill();

  // Origin dot
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x1, y1, 4, 0, Math.PI*2);
  ctx.fill();
}

// ===== Animation 4: Matrix Inverse =====
function drawInverseAnim(phase) {
  const ctx = animCtx;
  const A = [[3,1],[2,4]];
  const cs = 40;
  const mx = 50, my = 50;
  const t = Math.min(1, (Date.now() - phaseStartTime) / 2200);
  const ease = easeInOut(t);

  const caption = animCaptionEl;

  if (phase === 0) {
    // Phase 0: Matrix A displayed with title
    ctx.globalAlpha = ease;
    drawText(ctx, 'A\u207b\u00b9 是什么？', ANIM_W / 2 - 50, 20, '#ffcc00', 16);
    drawText(ctx, '矩阵 A', mx + cs, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, A, mx, my, cs);
    ctx.globalAlpha = 1;
    caption.textContent = 'A 的逆矩阵是什么？';

  } else if (phase === 1) {
    // Phase 1: Calculate determinant with diagonal highlights
    drawText(ctx, '矩阵 A', mx + cs, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, A, mx, my, cs);

    // Main diagonal green highlight
    if (ease > 0.1) {
      const alpha = Math.min(1, (ease - 0.1) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,255,136,0.2)';
      ctx.fillRect(mx, my, cs, cs);
      ctx.fillRect(mx + cs, my + cs, cs, cs);
      // Glow on elements
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(A[0][0], mx + cs / 2, my + cs / 2);
      ctx.fillText(A[1][1], mx + cs * 1.5, my + cs * 1.5);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // Anti-diagonal red highlight
    if (ease > 0.4) {
      const alpha = Math.min(1, (ease - 0.4) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(255,51,102,0.2)';
      ctx.fillRect(mx + cs, my, cs, cs);
      ctx.fillRect(mx, my + cs, cs, cs);
      ctx.shadowColor = '#ff3366';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ff3366';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(A[0][1], mx + cs * 1.5, my + cs / 2);
      ctx.fillText(A[1][0], mx + cs / 2, my + cs * 1.5);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // det formula fades in
    if (ease > 0.6) {
      ctx.globalAlpha = (ease - 0.6) / 0.4;
      drawText(ctx, 'det = 3\u00d74 - 1\u00d72 = 12 - 2 = 10', mx, my + cs * 2 + 25, '#00ff88', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '计算行列式 det(A) = 10';

  } else if (phase === 2) {
    // Phase 2: Swap diagonal with curved arrow animation
    drawText(ctx, '矩阵 A', mx + cs, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, A, mx, my, cs);

    // Show swapped matrix on the right
    const sx = 250, sy = my;
    drawText(ctx, '交换后:', sx + cs, sy - 16, '#ff6b35', 13);

    if (ease > 0.3) {
      const alpha = Math.min(1, (ease - 0.3) / 0.4);
      ctx.globalAlpha = alpha;
      const swapped = [[4,-1],[-2,3]];
      drawMatrix(ctx, swapped, sx, sy, cs);
      ctx.globalAlpha = 1;
    }

    // Curved arrow animation for diagonal swap (3 and 4)
    if (ease > 0.1) {
      const arrowProgress = Math.min(1, (ease - 0.1) / 0.5);
      // Arrow from A[0][0]=3 to swapped[1][1]=3
      drawAnimatedCurvedArrow(ctx, mx + cs / 2, my + cs / 2, sx + cs * 1.5, sy + cs * 1.5, '#00ff88', arrowProgress);
      // Arrow from A[1][1]=4 to swapped[0][0]=4
      drawAnimatedCurvedArrow(ctx, mx + cs * 1.5, my + cs * 1.5, sx + cs / 2, sy + cs / 2, '#00ff88', arrowProgress);
    }

    // Negate anti-diagonal elements (flash red)
    if (ease > 0.5) {
      const flashAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 150);
      ctx.globalAlpha = Math.min(1, (ease - 0.5) * 3) * flashAlpha;
      ctx.fillStyle = 'rgba(255,51,102,0.15)';
      ctx.fillRect(sx + cs, sy, cs, cs);
      ctx.fillRect(sx, sy + cs, cs, cs);
      ctx.globalAlpha = 1;
    }

    // Step text
    if (ease > 0.6) {
      ctx.globalAlpha = (ease - 0.6) / 0.4;
      drawText(ctx, '交换对角线，副对角线取负', mx, my + cs * 2 + 25, '#ffcc00', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '交换对角线元素，副对角线变号';

  } else if (phase === 3) {
    // Phase 3: Divide by det
    const swapped = [[4,-1],[-2,3]];
    const result = [[0.4, -0.1], [-0.2, 0.3]];

    drawText(ctx, '交换后', mx + cs, my - 16, '#ff6b35', 13);
    drawMatrix(ctx, swapped, mx, my, cs);

    const rx = 250, ry = my;

    // Division animation: each element transforms
    if (ease > 0.3) {
      const divProgress = Math.min(1, (ease - 0.3) / 0.5);
      ctx.globalAlpha = divProgress;

      // Show "÷10" above each cell
      for (let i = 0; i < 2; i++) {
        for (let j = 0; j < 2; j++) {
          const cx = rx + j * cs + cs / 2;
          const cy = ry + i * cs + cs / 2;
          // "÷10" label above
          ctx.fillStyle = '#ff6b35';
          ctx.font = '11px "JetBrains Mono"';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText('\u00f710', cx, ry + i * cs - 2);

          // Number morphs from original to result
          const origVal = swapped[i][j];
          const resVal = result[i][j];
          const displayVal = origVal + (resVal - origVal) * divProgress;
          ctx.fillStyle = '#ffcc00';
          ctx.font = 'bold 16px "JetBrains Mono"';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(Number(displayVal.toFixed(1)), cx, cy);
        }
      }
      ctx.globalAlpha = 1;
    }

    // Draw result matrix brackets
    if (ease > 0.2) {
      ctx.globalAlpha = Math.min(1, (ease - 0.2) / 0.3);
      ctx.strokeStyle = '#ffcc00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rx - 6, ry - 4); ctx.lineTo(rx - 10, ry - 4);
      ctx.lineTo(rx - 10, ry + cs * 2 + 4); ctx.lineTo(rx - 6, ry + cs * 2 + 4);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(rx + cs * 2 + 6, ry - 4); ctx.lineTo(rx + cs * 2 + 10, ry - 4);
      ctx.lineTo(rx + cs * 2 + 10, ry + cs * 2 + 4); ctx.lineTo(rx + cs * 2 + 6, ry + cs * 2 + 4);
      ctx.stroke();
      drawText(ctx, 'A\u207b\u00b9', rx + cs, ry - 16, '#ffcc00', 14);
      ctx.globalAlpha = 1;
    }

    // Equals sign between
    if (ease > 0.15) {
      ctx.globalAlpha = Math.min(1, (ease - 0.15) / 0.2);
      drawText(ctx, '=', mx + cs * 2 + 15, my + cs + 4, '#ff6b35', 18);
      ctx.globalAlpha = 1;
    }

    if (ease > 0.6) {
      ctx.globalAlpha = (ease - 0.6) / 0.4;
      drawText(ctx, '每个元素 \u00f7 det(10)', mx, my + cs * 2 + 25, '#ffcc00', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '每个元素除以行列式 10';

  } else {
    // Phase 4: Final result with glow
    const result = [[0.4, -0.1], [-0.2, 0.3]];
    const fx = ANIM_W / 2 - cs, fy = my + 10;

    // Title morphs
    if (ease > 0.1) {
      ctx.globalAlpha = ease;
      drawText(ctx, '逆矩阵 A\u207b\u00b9', ANIM_W / 2 - 40, fy - 20, '#ffcc00', 16);
      ctx.globalAlpha = 1;
    }

    // Result matrix with glow
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
    const scale = 0.8 + 0.2 * easeOutBounce(Math.min(1, t / 0.5));

    ctx.save();
    ctx.translate(ANIM_W / 2, fy + cs);
    ctx.scale(scale, scale);
    ctx.translate(-ANIM_W / 2, -(fy + cs));
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 15 * pulse;
    drawMatrix(ctx, result, fx, fy, cs + 4);
    ctx.shadowBlur = 0;
    ctx.restore();

    if (ease > 0.6) {
      ctx.globalAlpha = (ease - 0.6) / 0.4;
      drawText(ctx, '验证: A \u00d7 A\u207b\u00b9 = I（单位矩阵）', ANIM_W / 2 - 100, fy + cs * 2 + 30, '#00ff88', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '逆矩阵计算完成！';
  }
}

function drawAnimatedCurvedArrow(ctx, x1, y1, x2, y2, color, progress) {
  const cpx = (x1 + x2) / 2;
  const cpy = (y1 + y2) / 2 - 35;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  const dashOffset = -Date.now() / 80;
  ctx.lineDashOffset = dashOffset;

  // Draw partial path based on progress
  const steps = Math.floor(progress * 20);
  ctx.beginPath();
  for (let s = 0; s <= steps; s++) {
    const st = s / 20;
    const px = (1-st)*(1-st)*x1 + 2*(1-st)*st*cpx + st*st*x2;
    const py = (1-st)*(1-st)*y1 + 2*(1-st)*st*cpy + st*st*y2;
    if (s === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Arrowhead at current position
  if (progress > 0.05) {
    const st = steps / 20;
    const px = (1-st)*(1-st)*x1 + 2*(1-st)*st*cpx + st*st*x2;
    const py = (1-st)*(1-st)*y1 + 2*(1-st)*st*cpy + st*st*y2;
    // Tangent direction
    const dt = 0.01;
    const st2 = Math.min(1, st + dt);
    const px2 = (1-st2)*(1-st2)*x1 + 2*(1-st2)*st2*cpx + st2*st2*x2;
    const py2 = (1-st2)*(1-st2)*y1 + 2*(1-st2)*st2*cpy + st2*st2*y2;
    const angle = Math.atan2(py2 - py, px2 - px);
    const headLen = 8;
    ctx.setLineDash([]);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px - headLen * Math.cos(angle - 0.4), py - headLen * Math.sin(angle - 0.4));
    ctx.lineTo(px - headLen * Math.cos(angle + 0.4), py - headLen * Math.sin(angle + 0.4));
    ctx.closePath();
    ctx.fill();
  }

  ctx.setLineDash([]);
  ctx.lineDashOffset = 0;
}

// ===== Animation 5: Eigenvalue =====
function drawEigenvalueAnim(phase) {

  const caption = animCaptionEl;
  const baseY = my + cs * 2 + 20;

  if (phase === 0) {
    // Phase 0: Show matrix A with fade-in
    ctx.globalAlpha = ease;
    drawText(ctx, '矩阵 A', ANIM_W / 2, my - 16, '#00d4ff', 14);
    drawMatrix(ctx, A, mx, my, cs);
    ctx.globalAlpha = 1;
    caption.textContent = '展示矩阵 A';

  } else if (phase === 1) {
    // Phase 1: Highlight diagonal, show trace calculation with step-by-step fade-in
    // Highlight diagonal elements with glow
    if (ease > 0.1) {
      const alpha = Math.min(1, (ease - 0.1) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,212,255,0.2)';
      ctx.fillRect(mx, my, cs, cs);
      ctx.fillRect(mx + cs, my + cs, cs, cs);
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#00d4ff';
      ctx.font = 'bold 18px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(A[0][0], mx + cs / 2, my + cs / 2);
      ctx.fillText(A[1][1], mx + cs * 1.5, my + cs * 1.5);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // "tr(A) = " fades in
    if (ease > 0.3) {
      ctx.globalAlpha = Math.min(1, (ease - 0.3) / 0.2);
      drawText(ctx, 'tr(A) = ', 40, baseY + 10, '#00d4ff', 15);
      ctx.globalAlpha = 1;
    }
    // "2" fades in
    if (ease > 0.45) {
      ctx.globalAlpha = Math.min(1, (ease - 0.45) / 0.15);
      drawText(ctx, '2', 110, baseY + 10, '#00d4ff', 15);
      ctx.globalAlpha = 1;
    }
    // " + " fades in
    if (ease > 0.55) {
      ctx.globalAlpha = Math.min(1, (ease - 0.55) / 0.1);
      drawText(ctx, ' + ', 125, baseY + 10, '#e0e6ff', 15);
      ctx.globalAlpha = 1;
    }
    // "2" fades in
    if (ease > 0.65) {
      ctx.globalAlpha = Math.min(1, (ease - 0.65) / 0.15);
      drawText(ctx, '2', 155, baseY + 10, '#00d4ff', 15);
      ctx.globalAlpha = 1;
    }
    // " = 4" fades in
    if (ease > 0.75) {
      ctx.globalAlpha = Math.min(1, (ease - 0.75) / 0.25);
      drawText(ctx, ' = 4', 175, baseY + 10, '#ffcc00', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '计算迹 tr(A) = 2 + 2 = 4';

  } else if (phase === 2) {
    // Phase 2: Show determinant calculation with step-by-step
    // "det(A) = " fades in
    if (ease > 0.1) {
      ctx.globalAlpha = Math.min(1, (ease - 0.1) / 0.2);
      drawText(ctx, 'det(A) = ', 40, baseY + 10, '#00ff88', 15);
      ctx.globalAlpha = 1;
    }
    // "2×2" fades in
    if (ease > 0.25) {
      ctx.globalAlpha = Math.min(1, (ease - 0.25) / 0.15);
      drawText(ctx, '2\u00d72', 125, baseY + 10, '#00ff88', 15);
      ctx.globalAlpha = 1;
    }
    // " - " fades in
    if (ease > 0.4) {
      ctx.globalAlpha = Math.min(1, (ease - 0.4) / 0.1);
      drawText(ctx, ' - ', 160, baseY + 10, '#e0e6ff', 15);
      ctx.globalAlpha = 1;
    }
    // "1×1" fades in
    if (ease > 0.5) {
      ctx.globalAlpha = Math.min(1, (ease - 0.5) / 0.15);
      drawText(ctx, '1\u00d71', 190, baseY + 10, '#ff3366', 15);
      ctx.globalAlpha = 1;
    }
    // " = 3" fades in
    if (ease > 0.65) {
      ctx.globalAlpha = Math.min(1, (ease - 0.65) / 0.2);
      drawText(ctx, ' = 3', 225, baseY + 10, '#ffcc00', 15);
      ctx.globalAlpha = 1;
    }

    // Show trace result from previous phase (dimmed)
    ctx.globalAlpha = 0.4;
    drawText(ctx, 'tr(A) = 4', 40, baseY - 12, '#00d4ff', 13);
    ctx.globalAlpha = 1;
    caption.textContent = '计算行列式 det(A) = 2\u00d72 - 1\u00d71 = 3';

  } else if (phase === 3) {
    // Phase 3: Characteristic equation appears character by character
    // Show previous results dimmed
    ctx.globalAlpha = 0.3;
    drawText(ctx, 'tr(A) = 4', 40, baseY - 15, '#00d4ff', 12);
    drawText(ctx, 'det(A) = 3', 40, baseY, '#00ff88', 12);
    ctx.globalAlpha = 1;

    // "特征方程：" label
    if (ease > 0.1) {
      ctx.globalAlpha = Math.min(1, (ease - 0.1) / 0.2);
      drawText(ctx, '特征方程：', 40, baseY + 25, '#ffcc00', 15);
      ctx.globalAlpha = 1;
    }

    // Characters of "λ² - 4λ + 3 = 0" appear one by one
    const chars = [
      { text: '\u03bb\u00b2', start: 0.25 },
      { text: ' - ', start: 0.35 },
      { text: '4\u03bb', start: 0.45 },
      { text: ' + ', start: 0.55 },
      { text: '3', start: 0.65 },
      { text: ' = 0', start: 0.75 },
    ];

    let xOffset = 40;
    for (const ch of chars) {
      if (ease > ch.start) {
        const charAlpha = Math.min(1, (ease - ch.start) / 0.08);
        ctx.globalAlpha = charAlpha;
        drawText(ctx, ch.text, xOffset, baseY + 50, '#ffcc00', 20);
        // Approximate character width for positioning
        xOffset += ch.text.length * 12 + 2;
      }
    }
    ctx.globalAlpha = 1;
    caption.textContent = '特征方程 \u03bb\u00b2 - 4\u03bb + 3 = 0';

  } else {
    // Phase 4: Solve with quadratic formula, show eigenvalues
    // Show equation dimmed
    ctx.globalAlpha = 0.4;
    drawText(ctx, '\u03bb\u00b2 - 4\u03bb + 3 = 0', 40, baseY - 5, '#ffcc00', 14);
    ctx.globalAlpha = 1;

    // Quadratic formula steps
    if (ease > 0.1) {
      ctx.globalAlpha = Math.min(1, (ease - 0.1) / 0.2);
      drawText(ctx, '求根公式：', 40, baseY + 18, '#ff6b35', 14);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.25) {
      ctx.globalAlpha = Math.min(1, (ease - 0.25) / 0.2);
      drawText(ctx, '\u03bb = (4 \u00b1 \u221a(16-12)) / 2', 40, baseY + 40, '#ff6b35', 16);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.45) {
      ctx.globalAlpha = Math.min(1, (ease - 0.45) / 0.15);
      drawText(ctx, '  = (4 \u00b1 2) / 2', 40, baseY + 62, '#ff6b35', 16);
      ctx.globalAlpha = 1;
    }

    // Eigenvalues with scale-up and glow
    if (ease > 0.65) {
      const eigenEase = Math.min(1, (ease - 0.65) / 0.35);
      const scale1 = 0.5 + 0.5 * easeOutBounce(eigenEase);
      const scale2 = 0.5 + 0.5 * easeOutBounce(Math.min(1, (eigenEase - 0.2) / 0.8));
      const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);

      // λ₁ = 3
      ctx.save();
      ctx.translate(130, baseY + 95);
      ctx.scale(scale1, scale1);
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = 12 * pulse;
      ctx.fillStyle = '#00ff88';
      ctx.font = 'bold 22px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\u03bb\u2081 = 3', 0, 0);
      ctx.restore();

      // λ₂ = 1
      if (eigenEase > 0.3) {
        ctx.save();
        ctx.translate(320, baseY + 95);
        ctx.scale(scale2, scale2);
        ctx.shadowColor = '#00d4ff';
        ctx.shadowBlur = 12 * pulse;
        ctx.fillStyle = '#00d4ff';
        ctx.font = 'bold 22px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('\u03bb\u2082 = 1', 0, 0);
        ctx.restore();
      }
    }
    caption.textContent = '特征值 \u03bb\u2081 = 3, \u03bb\u2082 = 1';
  }
}

// ===== Animation 6: Matrix Transpose =====
function drawTransposeAnim(phase) {
  const ctx = animCtx;
  const A = [[1,2,3],[4,5,6]];
  const AT = [[1,4],[2,5],[3,6]];
  const cs = 36;
  const t = Math.min(1, (Date.now() - phaseStartTime) / 2200);
  const ease = easeInOut(t);

  const caption = animCaptionEl;

  // Positions
  const ax = 30, ay = 50;   // Original matrix A (2x3)
  const tx = 310, ty = 50;  // Transposed matrix AT (3x2)

  if (phase === 0) {
    // Phase 0: Show original matrix A with fade-in
    ctx.globalAlpha = ease;
    drawText(ctx, '矩阵 A（2\u00d73）', ax + cs * 1.5 - 30, ay - 16, '#a78bfa', 14);
    drawMatrix(ctx, A, ax, ay, cs);
    ctx.globalAlpha = 1;
    caption.textContent = '展示原始矩阵 A（2行3列）';

  } else if (phase === 1) {
    // Phase 1: Highlight row 1, animate it moving to column 1 of AT
    drawText(ctx, '矩阵 A（2\u00d73）', ax + cs * 1.5 - 30, ay - 16, '#a78bfa', 14);
    drawMatrix(ctx, A, ax, ay, cs);

    // Highlight row 0 of A
    if (ease > 0.1) {
      const alpha = Math.min(1, (ease - 0.1) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(167,139,250,0.3)';
      ctx.fillRect(ax, ay, cs * 3, cs);
      // Glow on row elements
      ctx.shadowColor = '#a78bfa';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#a78bfa';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(A[0][0], ax + cs / 2, ay + cs / 2);
      ctx.fillText(A[0][1], ax + cs * 1.5, ay + cs / 2);
      ctx.fillText(A[0][2], ax + cs * 2.5, ay + cs / 2);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // Show AT skeleton on the right
    if (ease > 0.2) {
      ctx.globalAlpha = Math.min(1, (ease - 0.2) / 0.3);
      drawText(ctx, 'A\u1d40（3\u00d72）', tx + cs - 15, ty - 16, '#ffcc00', 14);
      // Draw empty AT brackets
      drawEmptyMatrixBrackets(ctx, tx, ty, 3, 2, cs, '#ffcc00');
      ctx.globalAlpha = 1;
    }

    // Animate row 0 elements moving to column 0 of AT
    if (ease > 0.4) {
      const moveProgress = Math.min(1, (ease - 0.4) / 0.5);
      const me = easeInOut(moveProgress);
      ctx.globalAlpha = me;

      for (let j = 0; j < 3; j++) {
        const fromX = ax + j * cs + cs / 2;
        const fromY = ay + cs / 2;
        const toX = tx + cs / 2;
        const toY = ty + j * cs + cs / 2;
        const curX = fromX + (toX - fromX) * me;
        const curY = fromY + (toY - fromY) * me;

        ctx.shadowColor = '#a78bfa';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#a78bfa';
        ctx.font = 'bold 16px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(A[0][j], curX, curY);
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
    }

    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, '第1行 [1,2,3] \u2192 第1列', ANIM_W / 2 - 70, ANIM_H - 20, '#a78bfa', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '高亮第1行 [1,2,3]，转置后变成第1列';

  } else if (phase === 2) {
    // Phase 2: Highlight row 2, animate it moving to column 2 of AT
    drawText(ctx, '矩阵 A（2\u00d73）', ax + cs * 1.5 - 30, ay - 16, '#a78bfa', 14);
    drawMatrix(ctx, A, ax, ay, cs);

    // Show AT with column 0 filled (dimmed)
    drawText(ctx, 'A\u1d40（3\u00d72）', tx + cs - 15, ty - 16, '#ffcc00', 14);
    // Draw filled column 0
    for (let j = 0; j < 3; j++) {
      const cx = tx + cs / 2;
      const cy = ty + j * cs + cs / 2;
      ctx.fillStyle = 'rgba(167,139,250,0.5)';
      ctx.font = '16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(AT[j][0], cx, cy);
    }
    drawEmptyMatrixBrackets(ctx, tx, ty, 3, 2, cs, '#ffcc00');

    // Highlight row 1 of A
    if (ease > 0.1) {
      const alpha = Math.min(1, (ease - 0.1) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(255,107,53,0.3)';
      ctx.fillRect(ax, ay + cs, cs * 3, cs);
      ctx.shadowColor = '#ff6b35';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ff6b35';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(A[1][0], ax + cs / 2, ay + cs * 1.5);
      ctx.fillText(A[1][1], ax + cs * 1.5, ay + cs * 1.5);
      ctx.fillText(A[1][2], ax + cs * 2.5, ay + cs * 1.5);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // Animate row 1 elements moving to column 1 of AT
    if (ease > 0.4) {
      const moveProgress = Math.min(1, (ease - 0.4) / 0.5);
      const me = easeInOut(moveProgress);
      ctx.globalAlpha = me;

      for (let j = 0; j < 3; j++) {
        const fromX = ax + j * cs + cs / 2;
        const fromY = ay + cs * 1.5;
        const toX = tx + cs * 1.5;
        const toY = ty + j * cs + cs / 2;
        const curX = fromX + (toX - fromX) * me;
        const curY = fromY + (toY - fromY) * me;

        ctx.shadowColor = '#ff6b35';
        ctx.shadowBlur = 8;
        ctx.fillStyle = '#ff6b35';
        ctx.font = 'bold 16px "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(A[1][j], curX, curY);
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
    }

    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, '第2行 [4,5,6] \u2192 第2列', ANIM_W / 2 - 70, ANIM_H - 20, '#ff6b35', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '高亮第2行 [4,5,6]，转置后变成第2列';

  } else if (phase === 3) {
    // Phase 3: Show complete transposed matrix with glow
    drawText(ctx, '矩阵 A（2\u00d73）', ax + cs * 1.5 - 30, ay - 16, '#a78bfa', 14);
    drawMatrix(ctx, A, ax, ay, cs);

    // Arrow between
    drawText(ctx, '\u2192', ax + cs * 3 + 15, ay + cs + 4, '#ff6b35', 22);
    drawText(ctx, 'A\u1d40', ax + cs * 3 + 40, ay + cs + 4, '#ffcc00', 18);

    // Complete AT with glow pulse
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
    const scale = 0.8 + 0.2 * easeOutBounce(Math.min(1, t / 0.5));

    ctx.save();
    ctx.translate(tx + cs, ty + cs);
    ctx.scale(scale, scale);
    ctx.translate(-(tx + cs), -(ty + cs));
    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 15 * pulse;
    drawMatrix(ctx, AT, tx, ty, cs);
    ctx.shadowBlur = 0;
    ctx.restore();

    drawText(ctx, 'A\u1d40（3\u00d72）', tx + cs - 15, ty - 16, '#ffcc00', 14);

    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, '行变列，列变行，完成！', ANIM_W / 2 - 70, ANIM_H - 20, '#ffcc00', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '转置完成！A（2\u00d73）\u2192 A\u1d40（3\u00d72）';

  } else {
    // Phase 4: Show symmetric matrix special case
    const S = [[1,2,3],[2,5,6],[3,6,9]]; // Symmetric 3x3
    const scs = 32;
    const sx = ANIM_W / 2 - scs * 1.5, sy = 30;

    drawText(ctx, '对称矩阵：A\u1d40 = A', ANIM_W / 2 - 60, sy - 16, '#00ff88', 15);
    drawMatrix(ctx, S, sx, sy, scs);

    // Highlight main diagonal
    if (ease > 0.2) {
      const alpha = Math.min(1, (ease - 0.2) / 0.3);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(sx + 4, sy + 4);
      ctx.lineTo(sx + scs * 3 - 4, sy + scs * 3 - 4);
      ctx.stroke();

      // Highlight symmetric pairs with same color
      const pairs = [[0,1],[0,2],[1,2]];
      const colors = ['rgba(0,212,255,0.25)', 'rgba(255,107,53,0.25)', 'rgba(255,204,0,0.25)'];
      pairs.forEach(([r,c], idx) => {
        ctx.fillStyle = colors[idx];
        ctx.fillRect(sx + c * scs, sy + r * scs, scs, scs);
        ctx.fillRect(sx + r * scs, sy + c * scs, scs, scs);
      });
      ctx.globalAlpha = 1;
    }

    // Show aij = aji text
    if (ease > 0.5) {
      ctx.globalAlpha = (ease - 0.5) * 2;
      drawText(ctx, 'a\u1d62\u2c7c = a\u2c7c\u1d62  （关于主对角线对称）', ANIM_W / 2 - 90, sy + scs * 3 + 20, '#00ff88', 14);
      ctx.globalAlpha = 1;
    }

    // Show (Aᵀ)ᵀ = A property
    if (ease > 0.7) {
      ctx.globalAlpha = (ease - 0.7) / 0.3;
      drawText(ctx, '(A\u1d40)\u1d40 = A    转两次等于没转！', ANIM_W / 2 - 90, sy + scs * 3 + 45, '#ffcc00', 14);
      ctx.globalAlpha = 1;
    }

    caption.textContent = '对称矩阵的特殊性质';
  }
}

// ===== Animation 7: Matrix Symmetry =====
function drawSymmetryAnim(phase) {
  const ctx = animCtx;
  const caption = animCaptionEl;
  const t = Math.min(1, (Date.now() - phaseStartTime) / 2200);
  const ease = easeInOut(t);

  const symM = [[1,2,3],[2,5,6],[3,6,9]];
  const skewM = [[0,2,-3],[-2,0,4],[3,-4,0]];
  const asymM = [[1,3,2],[5,2,1],[4,6,3]];
  const cs = 32;

  if (phase === 0) {
    // Phase 0: Show symmetric matrix with main diagonal highlight
    const mx = ANIM_W / 2 - cs * 1.5, my = 30;
    ctx.globalAlpha = ease;
    drawText(ctx, '对称矩阵', ANIM_W / 2 - 30, my - 16, '#f472b6', 15);
    drawMatrix(ctx, symM, mx, my, cs);
    ctx.globalAlpha = 1;

    // Highlight main diagonal
    if (ease > 0.3) {
      const alpha = Math.min(1, (ease - 0.3) / 0.4);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(mx + 4, my + 4);
      ctx.lineTo(mx + cs * 3 - 4, my + cs * 3 - 4);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Show aij = aji pairs
    if (ease > 0.5) {
      const alpha = Math.min(1, (ease - 0.5) / 0.5);
      ctx.globalAlpha = alpha;
      const pairs = [[0,1],[0,2],[1,2]];
      const colors = ['rgba(0,212,255,0.3)', 'rgba(255,107,53,0.3)', 'rgba(255,204,0,0.3)'];
      pairs.forEach(([r,c], idx) => {
        ctx.fillStyle = colors[idx];
        ctx.fillRect(mx + c * cs, my + r * cs, cs, cs);
        ctx.fillRect(mx + r * cs, my + c * cs, cs, cs);
      });
      drawText(ctx, 'a\u1d62\u2c7c = a\u2c7c\u1d62  关于主对角线对称', ANIM_W / 2 - 100, my + cs * 3 + 18, '#00ff88', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '对称矩阵：aᵢⱼ = aⱼᵢ，关于主对角线对称';

  } else if (phase === 1) {
    // Phase 1: Folding animation - show symmetric pairs connecting
    const mx = ANIM_W / 2 - cs * 1.5, my = 30;
    drawText(ctx, '对称矩阵', ANIM_W / 2 - 30, my - 16, '#f472b6', 15);
    drawMatrix(ctx, symM, mx, my, cs);

    // Main diagonal line
    ctx.strokeStyle = 'rgba(0,255,136,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(mx + 4, my + 4);
    ctx.lineTo(mx + cs * 3 - 4, my + cs * 3 - 4);
    ctx.stroke();

    // Animate connecting lines between symmetric pairs
    const pairs = [[0,1],[0,2],[1,2]];
    const pairColors = ['#00d4ff', '#ff6b35', '#ffcc00'];
    pairs.forEach(([r,c], idx) => {
      const x1 = mx + c * cs + cs / 2;
      const y1 = my + r * cs + cs / 2;
      const x2 = mx + r * cs + cs / 2;
      const y2 = my + c * cs + cs / 2;
      const pairEase = Math.min(1, Math.max(0, (ease - idx * 0.2) / 0.4));
      if (pairEase > 0) {
        ctx.globalAlpha = pairEase;
        ctx.strokeStyle = pairColors[idx];
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x1 + (x2 - x1) * pairEase, y1 + (y2 - y1) * pairEase);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
      }
    });

    if (ease > 0.6) {
      ctx.globalAlpha = (ease - 0.6) / 0.4;
      drawText(ctx, '左右完全重合！', ANIM_W / 2 - 40, my + cs * 3 + 18, '#00ff88', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '折叠后左右完全重合 = 对称矩阵';

  } else if (phase === 2) {
    // Phase 2: Skew-symmetric matrix
    const mx = ANIM_W / 2 - cs * 1.5, my = 30;
    ctx.globalAlpha = ease;
    drawText(ctx, '反对称矩阵', ANIM_W / 2 - 40, my - 16, '#00d4ff', 15);
    drawMatrix(ctx, skewM, mx, my, cs);
    ctx.globalAlpha = 1;

    // Highlight diagonal zeros
    if (ease > 0.2) {
      const alpha = Math.min(1, (ease - 0.2) / 0.3);
      ctx.globalAlpha = alpha;
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = 'rgba(255,51,102,0.2)';
        ctx.fillRect(mx + i * cs, my + i * cs, cs, cs);
      }
      ctx.globalAlpha = 1;
    }

    // Show aij = -aji pairs
    if (ease > 0.4) {
      const alpha = Math.min(1, (ease - 0.4) / 0.4);
      ctx.globalAlpha = alpha;
      const pairs = [[0,1],[0,2],[1,2]];
      const colors = ['rgba(0,212,255,0.25)', 'rgba(255,107,53,0.25)', 'rgba(255,204,0,0.25)'];
      pairs.forEach(([r,c], idx) => {
        ctx.fillStyle = colors[idx];
        ctx.fillRect(mx + c * cs, my + r * cs, cs, cs);
        ctx.fillRect(mx + r * cs, my + c * cs, cs, cs);
      });
      drawText(ctx, '对角线为0，a\u1d62\u2c7c = -a\u2c7c\u1d62', ANIM_W / 2 - 90, my + cs * 3 + 18, '#00d4ff', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '反对称矩阵：对角线为0，aᵢⱼ = -aⱼᵢ';

  } else if (phase === 3) {
    // Phase 3: Asymmetric matrix
    const mx = ANIM_W / 2 - cs * 1.5, my = 30;
    ctx.globalAlpha = ease;
    drawText(ctx, '非对称矩阵', ANIM_W / 2 - 35, my - 16, '#ff6b35', 15);
    drawMatrix(ctx, asymM, mx, my, cs);
    ctx.globalAlpha = 1;

    // Highlight mismatched pairs
    if (ease > 0.3) {
      const alpha = Math.min(1, (ease - 0.3) / 0.4);
      ctx.globalAlpha = alpha;
      // a12=3 vs a21=5 (not equal, not opposite)
      ctx.fillStyle = 'rgba(255,51,102,0.3)';
      ctx.fillRect(mx + 1 * cs, my + 0 * cs, cs, cs);
      ctx.fillRect(mx + 0 * cs, my + 1 * cs, cs, cs);
      // a13=2 vs a31=4
      ctx.fillRect(mx + 2 * cs, my + 0 * cs, cs, cs);
      ctx.fillRect(mx + 0 * cs, my + 2 * cs, cs, cs);

      // Draw X marks on mismatched pairs
      ctx.strokeStyle = '#ff3366';
      ctx.lineWidth = 2;
      const mismatches = [[0,1],[1,0],[0,2],[2,0]];
      mismatches.forEach(([r,c]) => {
        const cx = mx + c * cs + cs / 2;
        const cy = my + r * cs + cs / 2;
        ctx.beginPath();
        ctx.moveTo(cx - 6, cy - 6); ctx.lineTo(cx + 6, cy + 6);
        ctx.moveTo(cx + 6, cy - 6); ctx.lineTo(cx - 6, cy + 6);
        ctx.stroke();
      });

      drawText(ctx, 'a\u1d62\u2c7c \u2260 a\u2c7c\u1d62 且 a\u1d62\u2c7c \u2260 -a\u2c7c\u1d62', ANIM_W / 2 - 110, my + cs * 3 + 18, '#ff3366', 14);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '非对称矩阵：既不对称也不反对称';

  } else {
    // Phase 4: Summary of three types
    const cs2 = 28;
    const gap = 20;
    const totalW = cs2 * 2 * 3 + gap * 2;
    const startX = (ANIM_W - totalW) / 2;
    const y = 25;

    // Symmetric
    const s1 = [[1,2],[2,3]];
    const s2 = [[0,1],[-1,0]];
    const s3 = [[1,3],[2,1]];

    if (ease > 0.1) {
      ctx.globalAlpha = Math.min(1, (ease - 0.1) / 0.3);
      drawText(ctx, '对称', startX + cs2, y - 14, '#f472b6', 13);
      drawMatrix(ctx, s1, startX, y, cs2);
      drawText(ctx, 'A\u1d40 = A', startX, y + cs2 * 2 + 10, '#00ff88', 12);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.3) {
      ctx.globalAlpha = Math.min(1, (ease - 0.3) / 0.3);
      const x2 = startX + cs2 * 2 + gap;
      drawText(ctx, '反对称', x2 + cs2, y - 14, '#00d4ff', 13);
      drawMatrix(ctx, s2, x2, y, cs2);
      drawText(ctx, 'A\u1d40 = -A', x2, y + cs2 * 2 + 10, '#00d4ff', 12);
      ctx.globalAlpha = 1;
    }
    if (ease > 0.5) {
      ctx.globalAlpha = Math.min(1, (ease - 0.5) / 0.3);
      const x3 = startX + (cs2 * 2 + gap) * 2;
      drawText(ctx, '非对称', x3 + cs2, y - 14, '#ff6b35', 13);
      drawMatrix(ctx, s3, x3, y, cs2);
      drawText(ctx, '以上都不满足', x3 - 10, y + cs2 * 2 + 10, '#ff6b35', 12);
      ctx.globalAlpha = 1;
    }

    if (ease > 0.7) {
      ctx.globalAlpha = (ease - 0.7) / 0.3;
      drawText(ctx, '掌握三种对称类型，快速判断！', ANIM_W / 2 - 110, y + cs2 * 2 + 40, '#ffcc00', 15);
      ctx.globalAlpha = 1;
    }
    caption.textContent = '三种对称类型总结';
  }
}

function drawEmptyMatrixBrackets(ctx, x, y, rows, cols, cs, color) {
  ctx.strokeStyle = color || '#ffcc00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 6, y - 4); ctx.lineTo(x - 10, y - 4);
  ctx.lineTo(x - 10, y + rows * cs + 4); ctx.lineTo(x - 6, y + rows * cs + 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + cols * cs + 6, y - 4); ctx.lineTo(x + cols * cs + 10, y - 4);
  ctx.lineTo(x + cols * cs + 10, y + rows * cs + 4); ctx.lineTo(x + cols * cs + 6, y + rows * cs + 4);
  ctx.stroke();
  // Draw question marks
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cx = x + j * cs + cs / 2;
      const cy = y + i * cs + cs / 2;
      ctx.fillStyle = 'rgba(255,204,0,0.2)';
      ctx.font = '16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('?', cx, cy);
    }
  }
}

// ===== Canvas Drawing Helpers =====
function drawMatrix(ctx, matrix, x, y, cellSize, highlightRow, highlightCol, highlightColor) {
  const rows = matrix.length, cols = matrix[0].length;
  // Draw bracket left
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 4, y - 4);
  ctx.lineTo(x - 8, y - 4);
  ctx.lineTo(x - 8, y + rows * cellSize + 4);
  ctx.lineTo(x - 4, y + rows * cellSize + 4);
  ctx.stroke();
  // Draw bracket right
  ctx.beginPath();
  ctx.moveTo(x + cols * cellSize + 4, y - 4);
  ctx.lineTo(x + cols * cellSize + 8, y - 4);
  ctx.lineTo(x + cols * cellSize + 8, y + rows * cellSize + 4);
  ctx.lineTo(x + cols * cellSize + 4, y + rows * cellSize + 4);
  ctx.stroke();

  // Draw cells
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const cx = x + j * cellSize + cellSize / 2;
      const cy = y + i * cellSize + cellSize / 2;

      // Highlight
      if (highlightRow !== undefined && i === highlightRow && highlightColor) {
        ctx.fillStyle = highlightColor;
        ctx.fillRect(x + j * cellSize, y + i * cellSize, cellSize, cellSize);
      }
      if (highlightCol !== undefined && j === highlightCol && highlightColor) {
        ctx.fillStyle = highlightColor;
        ctx.fillRect(x + j * cellSize, y + i * cellSize, cellSize, cellSize);
      }

      // Cell border
      ctx.strokeStyle = 'rgba(0,212,255,0.15)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x + j * cellSize, y + i * cellSize, cellSize, cellSize);

      // Number
      const val = matrix[i][j];
      const isNeg = val < 0;
      ctx.fillStyle = isNeg ? '#ff3366' : '#e0e6ff';
      ctx.font = 'bold 16px "JetBrains Mono"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(val, cx, cy);
    }
  }
}

function drawText(ctx, text, x, y, color, size) {
  ctx.fillStyle = color || '#e0e6ff';
  ctx.font = (size || 14) + 'px "Noto Sans SC", sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);
}

function drawArrow(ctx, x1, y1, x2, y2, color) {
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const headLen = 8;
  ctx.strokeStyle = color || '#00d4ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.fillStyle = color || '#00d4ff';
  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
  ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
  ctx.closePath();
  ctx.fill();
}

function drawVectorArrow(ctx, x1, y1, x2, y2, color, label) {
  drawFatVectorArrow(ctx, x1, y1, x2, y2, color, 2.5);
  if (label) {
    drawText(ctx, label, x2 + 8, y2 - 8, color, 13);
  }
}

function drawVector(ctx, ox, oy, vx, vy, color, label) {
  drawVectorArrow(ctx, ox, oy, ox + vx, oy - vy, color, label);
}
