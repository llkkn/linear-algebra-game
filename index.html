<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线性代数冒险 - Linear Algebra Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e27;--bg2:#111638;--primary:#00d4ff;--accent:#ff6b35;
  --success:#00ff88;--error:#ff3366;--warning:#ffcc00;
  --text:#e0e6ff;--text-dim:#6b7394;--card:rgba(17,22,56,0.85);
  --border:rgba(0,212,255,0.2);--glow:0 0 20px rgba(0,212,255,0.3);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:900px;height:100vh;position:relative;overflow:hidden}
canvas#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;z-index:1;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}
.screen.center-content{justify-content:center}
.font-orb{font-family:'Orbitron',monospace}
.font-mono{font-family:'JetBrains Mono',monospace}
h1{font-family:'Orbitron',monospace;font-size:clamp(1.8rem,5vw,3rem);font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:10px;letter-spacing:2px}
h2{font-family:'Orbitron',monospace;font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;color:var(--primary);margin-bottom:15px;text-align:center}
h3{font-size:1.1rem;color:var(--text-dim);margin-bottom:8px;text-align:center}
.subtitle{color:var(--text-dim);font-size:clamp(0.85rem,2vw,1rem);margin-bottom:30px;text-align:center}
.btn{font-family:'Orbitron',monospace;padding:12px 28px;border:2px solid var(--primary);background:transparent;color:var(--primary);font-size:0.95rem;cursor:pointer;border-radius:8px;transition:all .3s;position:relative;overflow:hidden;text-transform:uppercase;letter-spacing:1px}
.btn:hover{background:var(--primary);color:var(--bg);box-shadow:var(--glow);transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn-accent{border-color:var(--accent);color:var(--accent)}
.btn-accent:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(255,107,53,0.3)}
.btn-success{border-color:var(--success);color:var(--success)}
.btn-success:hover{background:var(--success);color:var(--bg);box-shadow:0 0 20px rgba(0,255,136,0.3)}
.btn-error{border-color:var(--error);color:var(--error)}
.btn-error:hover{background:var(--error);color:#fff;box-shadow:0 0 20px rgba(255,51,102,0.3)}
.btn-sm{padding:8px 18px;font-size:0.8rem}
.btn-lg{padding:16px 40px;font-size:1.1rem}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:15px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;backdrop-filter:blur(10px);width:100%;max-width:600px}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;width:100%;max-width:700px;margin:20px 0}
.mode-card{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:20px 15px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.mode-card:hover{transform:translateY(-5px);box-shadow:var(--glow)}
.mode-card .icon{font-family:'Orbitron',monospace;font-size:2rem;margin-bottom:8px;display:block}
.mode-card .name{font-family:'Orbitron',monospace;font-size:0.75rem;color:var(--text-dim);letter-spacing:1px;margin-bottom:4px}
.mode-card .name-zh{font-size:1rem;font-weight:700;margin-bottom:6px}
.mode-card .desc{font-size:0.8rem;color:var(--text-dim)}
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;width:100%;max-width:600px;margin:15px 0}
.level-card{background:var(--card);border:2px solid var(--border);border-radius:10px;padding:15px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.level-card:hover{transform:translateY(-3px);box-shadow:var(--glow)}
.level-card.locked{opacity:0.4;cursor:not-allowed}
.level-card.locked:hover{transform:none;box-shadow:none}
.level-card .level-num{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900}
.level-card .level-name{font-size:0.8rem;color:var(--text-dim);margin-top:4px}
.level-card .stars{margin-top:6px;font-size:0.9rem;color:var(--warning)}
.cat-section{width:100%;max-width:650px;margin:10px 0}
.cat-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:0 5px}
.cat-header .cat-name{font-family:'Orbitron',monospace;font-size:0.85rem;letter-spacing:1px}
.cat-header .cat-name-zh{font-size:0.9rem;font-weight:700}
.cat-header .cat-total{font-size:0.75rem;color:var(--text-dim);margin-left:auto}
.matrix-display{display:inline-grid;gap:2px;padding:10px;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:clamp(1rem,2.5vw,1.4rem);position:relative}
.matrix-display::before,.matrix-display::after{content:'';position:absolute;top:-5px;bottom:-5px;width:3px;border-radius:2px}
.matrix-display::before{left:-8px;border-left:3px solid var(--primary);border-top:3px solid var(--primary);border-bottom:3px solid var(--primary);border-radius:4px 0 0 4px}
.matrix-display::after{right:-8px;border-right:3px solid var(--primary);border-top:3px solid var(--primary);border-bottom:3px solid var(--primary);border-radius:0 4px 4px 0}
.matrix-cell{width:clamp(40px,8vw,60px);height:clamp(36px,7vw,50px);display:flex;align-items:center;justify-content:center;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.15);border-radius:4px;color:var(--text)}
.matrix-cell.input-cell{background:rgba(0,212,255,0.1);border-color:var(--primary);cursor:pointer}
.matrix-cell.input-cell input{width:100%;height:100%;background:transparent;border:none;color:var(--primary);text-align:center;font-family:'JetBrains Mono',monospace;font-size:inherit;outline:none}
.matrix-cell.correct{background:rgba(0,255,136,0.2);border-color:var(--success);color:var(--success)}
.matrix-cell.wrong{background:rgba(255,51,102,0.2);border-color:var(--error);color:var(--error)}
.matrix-cell.revealed{background:rgba(255,204,0,0.15);border-color:var(--warning);color:var(--warning)}
.game-hud{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;padding:10px 15px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:15px;flex-wrap:wrap;gap:8px}
.hud-item{display:flex;align-items:center;gap:6px;font-size:0.85rem}
.hud-item .label{color:var(--text-dim);font-size:0.75rem}
.hud-item .value{font-family:'Orbitron',monospace;font-weight:700;color:var(--primary)}
.hud-item .value.score-val{color:var(--warning)}
.hud-item .value.combo-val{color:var(--accent)}
.hud-item .value.time-val{color:var(--success)}
.game-area{display:flex;flex-direction:column;align-items:center;gap:15px;width:100%;max-width:700px}
.problem-statement{font-size:1.1rem;text-align:center;margin:5px 0}
.problem-statement .op{color:var(--accent);font-weight:700;font-size:1.3rem}
.answer-input{font-family:'JetBrains Mono',monospace;font-size:1.3rem;padding:10px 20px;background:rgba(0,212,255,0.08);border:2px solid var(--primary);border-radius:8px;color:var(--primary);text-align:center;width:150px;outline:none;transition:border-color .3s}
.answer-input:focus{border-color:var(--accent);box-shadow:0 0 15px rgba(255,107,53,0.3)}
.answer-input.correct{border-color:var(--success);color:var(--success)}
.answer-input.wrong{border-color:var(--error);color:var(--error)}
.judgment-btns{display:flex;gap:15px;margin:10px 0}
.judgment-btn{padding:15px 30px;border:2px solid;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Noto Sans SC',sans-serif}
.judgment-btn.dep{border-color:var(--error);color:var(--error);background:rgba(255,51,102,0.1)}
.judgment-btn.dep:hover{background:var(--error);color:#fff}
.judgment-btn.indep{border-color:var(--success);color:var(--success);background:rgba(0,255,136,0.1)}
.judgment-btn.indep:hover{background:var(--success);color:var(--bg)}
.judgment-btn.selected-correct{animation:correctPulse .5s}
.judgment-btn.selected-wrong{animation:wrongShake .5s}
.rules-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;width:100%;max-width:700px;margin:10px 0;overflow:hidden}
.rules-toggle{width:100%;padding:12px 15px;background:transparent;border:none;color:var(--text-dim);font-size:0.85rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Noto Sans SC',sans-serif}
.rules-toggle:hover{color:var(--text)}
.rules-content{padding:0 15px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.rules-content.open{max-height:500px;padding:10px 15px 15px}
.rules-content p{font-size:0.85rem;line-height:1.6;margin:5px 0;color:var(--text-dim)}
.rules-content .formula{font-family:'JetBrains Mono',monospace;color:var(--primary);background:rgba(0,212,255,0.08);padding:2px 8px;border-radius:4px;display:inline-block;margin:3px 0}
.tutorial-box{background:var(--card);border:2px solid var(--warning);border-radius:12px;padding:20px;width:100%;max-width:600px;position:relative;margin:10px 0}
.tutorial-box .tut-title{font-family:'Orbitron',monospace;color:var(--warning);font-size:1rem;margin-bottom:10px}
.tutorial-box p{font-size:0.9rem;line-height:1.7;margin:8px 0;color:var(--text)}
.tutorial-box .formula-block{background:rgba(255,204,0,0.08);border:1px solid rgba(255,204,0,0.2);border-radius:8px;padding:12px;margin:10px 0;font-family:'JetBrains Mono',monospace;text-align:center;color:var(--warning);font-size:1rem;line-height:1.8}
.tutorial-box .example-block{background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);border-radius:8px;padding:14px 16px;margin:10px 0;font-family:'JetBrains Mono',monospace;color:var(--text);font-size:0.88rem;line-height:2;white-space:pre-wrap;word-break:break-all}
.tutorial-box .example-block .arrow{color:var(--primary);font-weight:700}
.tutorial-box .example-block .check{color:var(--success);font-weight:700}
.tutorial-box .tut-progress{font-size:0.8rem;color:var(--text-dim);margin-bottom:16px;padding:4px 12px;background:rgba(0,212,255,0.08);border-radius:20px;display:inline-block}
.tutorial-box .step-content{flex:1}
.tutorial-box .step{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.tutorial-box .step-num{min-width:32px;height:32px;background:rgba(0,212,255,0.15);border:1px solid rgba(0,212,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:0.8rem;color:var(--primary);flex-shrink:0;margin-top:2px}
.tutorial-box .step-text{color:var(--text);font-size:0.95rem;line-height:1.7;margin-bottom:4px}
.tutorial-box .step-text{font-size:0.85rem;line-height:1.6;color:var(--text)}
.guide-bubble{position:absolute;background:var(--warning);color:var(--bg);padding:8px 14px;border-radius:8px;font-size:0.8rem;font-weight:700;z-index:10;white-space:nowrap;pointer-events:none;animation:bubbleFloat 2s ease-in-out infinite}
.guide-bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:8px solid transparent;border-top-color:var(--warning);border-bottom:0}
.result-card{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:30px;text-align:center;width:100%;max-width:500px}
.result-card .big-score{font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;color:var(--warning);margin:10px 0}
.result-card .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0}
.result-card .stat{background:rgba(0,212,255,0.05);border-radius:8px;padding:10px}
.result-card .stat .stat-label{font-size:0.75rem;color:var(--text-dim)}
.result-card .stat .stat-value{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--primary)}
.result-card .stars-display{font-size:2rem;margin:10px 0}
.settings-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:400px}
.settings-panel .setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-panel .setting-row:last-child{border-bottom:none}
.settings-panel .setting-label{font-size:0.9rem}
.diff-btns{display:flex;gap:5px}
.diff-btn{padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:0.75rem;font-family:'Orbitron',monospace;border-radius:5px;cursor:pointer;transition:all .2s}
.diff-btn.active{border-color:var(--primary);color:var(--primary);background:rgba(0,212,255,0.1)}
.diff-btn:hover{border-color:var(--primary);color:var(--primary)}
.transition-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(10,14,39,0.9);flex-direction:column;gap:15px}
.transition-overlay.active{display:flex}
.transition-overlay .trans-text{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;animation:transPulse 1s ease-in-out infinite}
.transition-overlay .trans-sub{color:var(--text-dim);font-size:1rem}
.particle-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particleFade 1s ease-out forwards}
.shockwave{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;border:3px solid var(--error);pointer-events:none;z-index:50;animation:shockwaveExpand .6s ease-out forwards}
.confetti{position:fixed;top:-10px;width:10px;height:10px;pointer-events:none;z-index:50;animation:confettiFall 2s ease-in forwards}
.combo-glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;color:var(--accent);pointer-events:none;z-index:50;animation:comboGlow 1s ease-out forwards;text-shadow:0 0 20px var(--accent)}
.progress-bar{width:100%;max-width:700px;height:6px;background:rgba(0,212,255,0.1);border-radius:3px;margin:5px 0;overflow:hidden}
.progress-bar .fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .3s}
.arcade-lives{font-size:1.2rem;letter-spacing:2px}
.arcade-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.7rem;font-family:'Orbitron',monospace;letter-spacing:1px;background:rgba(244,114,182,0.15);border:1px solid rgba(244,114,182,0.3);color:#f472b6}
.eigen-eq{font-family:'JetBrains Mono',monospace;font-size:1.1rem;text-align:center;margin:8px 0;color:var(--text)}
.eigen-eq .blank{display:inline-block;width:50px;border-bottom:2px solid var(--primary);margin:0 3px;text-align:center;color:var(--primary)}
.eigen-inputs{display:flex;gap:15px;align-items:center;justify-content:center;margin:10px 0}
.eigen-inputs label{font-size:0.9rem;color:var(--text-dim)}
.eigen-inputs input{font-family:'JetBrains Mono',monospace;font-size:1.1rem;padding:8px 12px;background:rgba(0,212,255,0.08);border:2px solid var(--primary);border-radius:6px;color:var(--primary);text-align:center;width:100px;outline:none}
.eigen-inputs input:focus{border-color:var(--accent)}
.hint-btn{position:absolute;top:10px;right:10px;background:transparent;border:1px solid var(--warning);color:var(--warning);padding:5px 10px;border-radius:6px;font-size:0.75rem;cursor:pointer;font-family:'Orbitron',monospace;transition:all .2s}
.hint-btn:hover{background:var(--warning);color:var(--bg)}
.back-btn{position:absolute;top:15px;left:15px;background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 14px;border-radius:6px;font-size:0.8rem;cursor:pointer;transition:all .2s;z-index:5;font-family:'Noto Sans SC',sans-serif}
.back-btn:hover{border-color:var(--primary);color:var(--primary)}
#animContainer { background: rgba(0,212,255,0.03); border: 1px solid rgba(0,212,255,0.1); border-radius: 12px; padding: 16px; }
#animCanvas { display: block; margin: 0 auto; border-radius: 8px; background: rgba(10,14,39,0.8); max-width: 100%; }
@keyframes correctPulse{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes particleFade{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}}
@keyframes shockwaveExpand{0%{width:10px;height:10px;opacity:1}100%{width:300px;height:300px;opacity:0}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes comboGlow{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.5)}}
@keyframes bubbleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes transPulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.fade-in{animation:fadeIn .5s ease-out}
.slide-in{animation:slideIn .4s ease-out}
@media(max-width:600px){
  .mode-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
  .mode-card{padding:15px 10px}
  .mode-card .icon{font-size:1.5rem}
  .game-hud{padding:8px 10px;gap:5px}
  .hud-item{font-size:0.75rem}
  .judgment-btn{padding:12px 20px;font-size:0.9rem}
  .matrix-cell{width:36px;height:32px;font-size:0.85rem}
  .answer-input{font-size:1.1rem;width:120px}
}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="particle-container" id="particleContainer"></div>
<div class="transition-overlay" id="transitionOverlay">
  <div class="trans-text" id="transText"></div>
  <div class="trans-sub" id="transSub"></div>
</div>

<div id="app">
  <!-- START SCREEN -->
  <div class="screen active center-content" id="startScreen">
    <div style="animation:fadeIn .8s ease-out">
      <h1>LINEAR ALGEBRA</h1>
      <h2 style="color:var(--accent);font-size:clamp(1rem,3vw,1.5rem);margin-bottom:5px">线 性 代 数 冒 险</h2>
      <p class="subtitle">掌握矩阵运算，征服线性世界</p>
      <div class="btn-group" style="flex-direction:column;align-items:center;gap:12px">
        <button class="btn btn-lg" onclick="showScreen('modeSelectScreen')">开始冒险</button>
        <button class="btn btn-sm btn-accent" onclick="showScreen('settingsScreen')">游戏设置</button>
      </div>
    </div>
  </div>

  <!-- MODE SELECT SCREEN -->
  <div class="screen center-content" id="modeSelectScreen">
    <button class="back-btn" onclick="showScreen('startScreen')">&#8592; 返回</button>
    <h2>选择模式</h2>
    <p class="subtitle">选择你想挑战的题型</p>
    <div class="mode-grid" id="modeGrid"></div>
  </div>

  <!-- LEVEL SELECT SCREEN -->
  <div class="screen center-content" id="levelSelectScreen">
    <button class="back-btn" onclick="showScreen('modeSelectScreen')">&#8592; 返回</button>
    <h2 id="levelSelectTitle">选择关卡</h2>
    <div id="levelCategories"></div>
  </div>

  <!-- TUTORIAL SCREEN -->
  <div class="screen" id="tutorialScreen" style="padding-top:30px;padding-bottom:40px;">
    <div id="tutorialContent" style="max-width:600px;width:100%">
      <div id="animContainer" style="display:none; margin: 0 auto 16px auto; max-width:520px; width:100%;">
        <canvas id="animCanvas" width="480" height="280"></canvas>
        <div style="display:flex; gap:10px; justify-content:center; margin-top:10px;">
          <button class="btn btn-sm" id="animPlayBtn" onclick="togglePause()">播放演示</button>
          <button class="btn btn-sm" id="animResetBtn" onclick="resetAnimation()">重置</button>
        </div>
        <div id="animCaption" style="text-align:center; color:var(--text-dim); font-size:0.85rem; margin-top:8px; min-height:20px;"></div>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="gameScreen">
    <button class="back-btn" onclick="openGameSettings()">&#9881; 设置</button>
    <div class="game-hud" id="gameHud">
      <div class="hud-item"><span class="label">得分</span><span class="value score-val" id="hudScore">0</span></div>
      <div class="hud-item"><span class="label">连击</span><span class="value combo-val" id="hudCombo">0</span></div>
      <div class="hud-item"><span class="label">题目</span><span class="value" id="hudProgress">1/5</span></div>
      <div class="hud-item"><span class="label">时间</span><span class="value time-val" id="hudTime">0s</span></div>

    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
    <div class="game-area" id="gameArea"></div>
    <div class="rules-panel" id="rulesPanel" style="margin-top:10px">

        <span>&#9654; 查看规则与公式</span><span id="rulesArrow">&#9660;</span>

      <div class="rules-content" id="rulesContent"></div>
    </div>
    <div class="btn-group" style="margin-top:10px">
      <button class="btn btn-sm" onclick="useHint()" id="hintBtn" style="display:none">提示 (-5分)</button>
    </div>
    <!-- Game Settings Overlay -->
    <div class="overlay" id="gameSettingsOverlay" style="display:none">
      <div class="settings-card fade-in" style="max-width:360px">
        <h3 style="margin:0 0 20px;color:var(--primary)">游戏设置</h3>
        <div style="display:flex;flex-direction:column;gap:12px">
          <button class="btn" onclick="resumeGame()" style="justify-content:center">继续游戏</button>
          <button class="btn" onclick="restartCurrentLevel()" style="justify-content:center">重新开始本关</button>
          <button class="btn btn-sm" onclick="quitToLevelSelect()" style="justify-content:center">退出到关卡选择</button>
          <button class="btn btn-sm btn-accent" onclick="quitToModeSelect()" style="justify-content:center">退出到模式选择</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="resultScreen">
    <div class="result-card fade-in" id="resultCard"></div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div class="screen" id="settingsScreen">
    <button class="back-btn" onclick="showScreen('startScreen')">&#8592; 返回</button>
    <h2>游戏设置</h2>
    <div class="settings-panel">
      <div class="setting-row">
        <span class="setting-label">难度</span>
        <div class="diff-btns" id="diffBtns">
          <button class="diff-btn" data-diff="easy" onclick="setDifficulty('easy')">EASY</button>
          <button class="diff-btn active" data-diff="normal" onclick="setDifficulty('normal')">NORMAL</button>
          <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">HARD</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">重播教程</span>
        <button class="btn btn-sm btn-success" onclick="replayTutorial()">重播</button>
      </div>
      <div class="setting-row">
        <span class="setting-label">重置进度</span>
        <button class="btn btn-sm btn-error" onclick="resetProgress()">重置</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const gameModes = {
  multiplication: { name: '矩阵乘法', nameEn: 'MULTIPLICATION', icon: '×', color: '#00d4ff', desc: '计算矩阵A×B的结果' },
  determinant:   { name: '行列式计算', nameEn: 'DETERMINANT', icon: '|A|', color: '#00ff88', desc: '计算方阵的行列式值' },
  linearDep:     { name: '线性相关性', nameEn: 'LINEAR DEP.', icon: '∑', color: '#ff6b35', desc: '判断向量组的线性相关性' },
  inverse:       { name: '矩阵求逆', nameEn: 'INVERSE', icon: 'A⁻¹', color: '#ff3366', desc: '计算矩阵的逆矩阵' },
  eigenvalue:    { name: '特征值', nameEn: 'EIGENVALUES', icon: 'λ', color: '#ffcc00', desc: '求矩阵的特征值' },
  transpose:     { name: '矩阵转置', nameEn: 'TRANSPOSE', icon: 'Aᵀ', color: '#a78bfa', desc: '计算矩阵的转置' },
  symmetry:      { name: '对称性判断', nameEn: 'SYMMETRY', icon: '↔', color: '#f472b6', desc: '街机模式：判断矩阵对称类型', arcade: true },
  rank:          { name: '矩阵的秩', nameEn: 'RANK', icon: 'r(A)', color: '#34d399', desc: '求矩阵的秩' },
  equation:      { name: '线性方程组', nameEn: 'EQUATIONS', icon: 'Ax=b', color: '#60a5fa', desc: '求解线性方程组' },
  elementary:    { name: '初等变换', nameEn: 'ROW OPS', icon: '↻', color: '#fbbf24', desc: '矩阵的初等行变换' },
};
const categories = {
  tutorial:     { name: '新手教程', nameEn: 'TUTORIAL', total: 1, color: '#00ff88' },
  beginner:     { name: '初级关卡', nameEn: 'BEGINNER', total: 3, color: '#00d4ff' },
  intermediate: { name: '中级关卡', nameEn: 'INTERMEDIATE', total: 3, color: '#ff6b35' },
  advanced:     { name: '高级关卡', nameEn: 'ADVANCED', total: 4, color: '#ff3366' },
};

// ==================== STATE ====================
let state = {
  currentMode: null,
  currentCategory: null,
  currentLevel: 0,
  difficulty: 'normal',
  score: 0,
  combo: 0,
  maxCombo: 0,
  questionIndex: 0,
  totalQuestions: 5,
  correctCount: 0,
  startTime: 0,
  questionStartTime: 0,
  hintsUsed: 0,
  isTutorial: false,
  tutorialStep: 0,
  questions: [],
  answers: [],
  answered: false,
  timerInterval: null,
  elapsed: 0,
};

let progress = loadProgress();

function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('la_game_progress'));
    if (d && d.modes) return d;
  } catch(e) {}
  const p = { modes: {} };
  Object.keys(gameModes).forEach(m => { p.modes[m] = {}; });
  return p;
}
function saveProgress() { localStorage.setItem('la_game_progress', JSON.stringify(progress)); }
function resetProgress() {
  progress = { modes: {} };
  Object.keys(gameModes).forEach(m => { progress.modes[m] = {}; });
  saveProgress();
  alert('进度已重置！');
}
function getStars(mode, cat, lvl) {
  try { return (progress.modes[mode][cat] && progress.modes[mode][cat][lvl]) || 0; } catch(e) { return 0; }
}
function setStars(mode, cat, lvl, s) {
  if (!progress.modes[mode]) progress.modes[mode] = {};
  if (!progress.modes[mode][cat]) progress.modes[mode][cat] = {};
  const old = progress.modes[mode][cat][lvl] || 0;
  progress.modes[mode][cat][lvl] = Math.max(old, s);
  saveProgress();
}
function isUnlocked(mode, cat, lvl) {
  if (cat === 'tutorial') return true;
  if (cat === 'beginner') return getStars(mode, 'tutorial', 0) > 0;
  const cats = Object.keys(categories);
  const ci = cats.indexOf(cat);
  if (ci > 0) {
    const prevCat = cats[ci - 1];
    if (lvl === 0) return getStars(mode, prevCat, categories[prevCat].total - 1) > 0;
    return getStars(mode, cat, lvl - 1) > 0;
  }
  return true;
}

// ==================== SCREENS ====================
function showScreen(id) {
  if (id !== 'tutorialScreen') stopAnimation();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'modeSelectScreen') renderModeSelect();
  if (id === 'levelSelectScreen') renderLevelSelect();
  if (id === 'settingsScreen') renderSettings();
}

function renderModeSelect() {
  const grid = document.getElementById('modeGrid');
  grid.innerHTML = '';
  Object.entries(gameModes).forEach(([key, m]) => {
    const card = document.createElement('div');
    card.className = 'mode-card slide-in';
    card.style.borderColor = m.color + '33';
    card.innerHTML = `<span class="icon" style="color:${m.color}">${m.icon}</span><div class="name">${m.nameEn}</div><div class="name-zh" style="color:${m.color}">${m.name}</div><div class="desc">${m.desc}</div>`;
    card.onclick = () => selectMode(key);
    grid.appendChild(card);
  });
}

function selectMode(mode) {
  state.currentMode = mode;
  renderLevelSelect();
  showScreen('levelSelectScreen');
}

function renderLevelSelect() {
  const mode = state.currentMode;
  const m = gameModes[mode];
  document.getElementById('levelSelectTitle').textContent = m.name;
  document.getElementById('levelSelectTitle').style.color = m.color;
  const container = document.getElementById('levelCategories');

  // Arcade mode: show arcade-style UI instead of level grid
  if (m.arcade) {
    const highScore = getArcadeHighScore(mode);
    container.innerHTML = '';
    // Game description card
    const descCard = document.createElement('div');
    descCard.className = 'card fade-in';
    descCard.style.borderColor = m.color + '33';
    descCard.style.marginBottom = '15px';
    descCard.innerHTML = `
      <div style="text-align:center;margin-bottom:15px">
        <span style="font-size:2.5rem;display:block;margin-bottom:8px">${m.icon}</span>
        <h3 style="color:${m.color};margin-bottom:5px">ARCADE MODE</h3>
        <p style="color:var(--text-dim);font-size:0.9rem">街机模式</p>
      </div>
      <div style="background:rgba(0,212,255,0.05);border-radius:8px;padding:15px;margin-bottom:15px">
        <p style="font-size:0.9rem;color:var(--text);line-height:1.8;margin:0">
          <strong style="color:${m.color}">游戏规则：</strong><br>
          - 判断矩阵是对称、反对称还是非对称<br>
          - 共有 <strong>3 条命</strong>，答错一次失去一条命<br>
          - 每答对 5 题，难度提升一级（矩阵变大）<br>
          - 每答对一题得 <strong>10 x 难度</strong> 分，连击额外加分<br>
          - 追求最高分和最长连击！
        </p>
      </div>
      ${highScore > 0 ? `
      <div style="text-align:center;margin-bottom:15px;padding:10px;background:rgba(255,204,0,0.08);border:1px solid rgba(255,204,0,0.2);border-radius:8px">
        <div style="font-size:0.75rem;color:var(--text-dim)">最高分记录</div>
        <div style="font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;color:var(--warning)">${highScore}</div>
      </div>` : ''}
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <button class="btn btn-lg btn-success" onclick="startArcadeMode()" style="min-width:200px;font-size:1.1rem">开始挑战</button>
        <button class="btn btn-sm" onclick="showTutorial('${mode}', function(){ showScreen('levelSelectScreen'); })">查看教程</button>
      </div>
    `;
    container.appendChild(descCard);
    return;
  }

  container.innerHTML = '';
  Object.entries(categories).forEach(([catKey, cat]) => {
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.innerHTML = `<div class="cat-header"><span class="cat-name" style="color:${cat.color}">${cat.nameEn}</span><span class="cat-name-zh">${cat.name}</span><span class="cat-total">${cat.total} 关</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'level-grid';
    for (let i = 0; i < cat.total; i++) {
      const card = document.createElement('div');
      const unlocked = isUnlocked(mode, catKey, i);
      card.className = 'level-card' + (unlocked ? '' : ' locked');
      const stars = getStars(mode, catKey, i);
      const starsHtml = unlocked ? `<div class="stars">${'★'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>` : '<div style="color:var(--text-dim);font-size:0.8rem;margin-top:4px">🔒</div>';
      card.innerHTML = `<div class="level-num" style="color:${unlocked ? cat.color : 'var(--text-dim)'}">${i + 1}</div><div class="level-name">${catKey === 'tutorial' ? '教程' : '第' + (i+1) + '关'}</div>${starsHtml}`;
      if (unlocked) {
        card.onclick = () => startLevel(catKey, i);
      }
      grid.appendChild(card);
    }
    section.appendChild(grid);
    container.appendChild(section);
  });
}

// ==================== ARCADE MODE ====================
function getArcadeHighScore(mode) {
  try { return parseInt(localStorage.getItem('la_arcade_' + mode)) || 0; } catch(e) { return 0; }
}
function setArcadeHighScore(mode, score) {
  const old = getArcadeHighScore(mode);
  if (score > old) localStorage.setItem('la_arcade_' + mode, score);
  return Math.max(score, old);
}

function startArcadeMode() {
  const mode = state.currentMode;
  state.currentCategory = 'arcade';
  state.currentLevel = 0;
  state.isTutorial = false;
  state.score = 0;
  state.arcadeScore = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.questionIndex = 0;
  state.correctCount = 0;
  state.hintsUsed = 0;
  state.totalQuestions = 999; // effectively infinite
  state.answers = [];
  state.answered = false;
  state.lives = 3;
  state.difficulty = 1;
  state.maxDifficulty = 1;
  state.questions = [];
  beginArcadeGame();
}

function beginArcadeGame() {
  state.startTime = Date.now();
  state.elapsed = 0;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(updateTimer, 1000);
  // Generate first question
  state.questions = [generateOneQuestion(state.currentMode, 'arcade')];
  showScreen('gameScreen');
  renderRules();
  renderQuestion();
}

function getArcadeCat() {
  // Map difficulty level to category for question generation
  if (state.difficulty <= 2) return 'beginner';
  if (state.difficulty <= 4) return 'intermediate';
  return 'advanced';
}

function generateNextArcadeQuestion() {
  state.questions = [generateOneQuestion(state.currentMode, 'arcade')];
}

// ==================== TUTORIALS ====================
const tutorials = {
  multiplication: {
    title: '矩阵乘法 · 新手教程',
    steps: [
      {
        text: '什么是矩阵乘法？简单来说，就是把两个"数字表格"按照特定规则合并成一个新的表格。',
        example: '比如，把下面两个矩阵相乘：\n\n矩阵 A = [1  2]    矩阵 B = [3  0]\n        [0  1]            [1  2]\n\nA × B = ？'
      },
      {
        text: '计算规则：结果中每个数字 = "A 的某一行" 与 "B 的某一列" 配对相乘，再全部加起来。',
        example: '先算结果【左上角】的数字：\n\n  取 A 的第 1 行 ─→ [ 1 , 2 ]\n  取 B 的第 1 列 ─→ [ 3 ]\n                       [ 1 ]\n\n  配对相乘再相加：\n  1 × 3 + 2 × 1 = 3 + 2 = 5  ✓'
      },
      {
        text: '再算结果【右下角】的数字：',
        example: '  取 A 的第 2 行 ─→ [ 0 , 1 ]\n  取 B 的第 2 列 ─→ [ 0 ]\n                       [ 2 ]\n\n  配对相乘再相加：\n  0 × 0 + 1 × 2 = 0 + 2 = 2  ✓'
      },
      {
        text: '四个位置都算完，就得到最终结果：',
        example: '[1  2]   [3  0]   [5  4]\n[0  1] × [1  2] = [1  2]\n\n左上: 1×3+2×1 = 5    右上: 1×0+2×2 = 4\n左下: 0×3+1×1 = 1    右下: 0×0+1×2 = 2'
      },
      {
        text: '记住口诀：取 A 的一行、取 B 的一列，配对相乘再加起来！现在来试试吧 🎯'
      }
    ]
  },
  determinant: {
    title: '行列式计算 · 新手教程',
    steps: [
      {
        text: '什么是行列式？它就是把一个方阵（正方形表格）变成一个数字的运算。',
        example: '比如，求下面矩阵的行列式：\n\n[3  1]\n[2  4]\n\n|A| = ？'

      {

      {

      }
    ]
  },
  linearDep: {

        text: '如果没有任何一个向量能用其他向量拼出来，就叫"线性无关"。',

        example: '如果矩阵 A 乘以某个向量 v，结果只是 v 的倍数：\n\nA × v = λ × v\n\n那么 λ 就是特征值，v 就是对应的特征向量'

      {
        text: '怎么求特征值？先列出"特征方程"：',

      },
      {
        text: '转置规则很简单：原来的第 i 行第 j 列 → 变成第 j 行第 i 列',

function showTutorial(mode, callback) {
  stopAnimation();
  const tut = tutorials[mode];
  const container = document.getElementById('tutorialContent');
  // Only clear tutorial steps, not the animContainer
  const existingBox = container.querySelector('.tutorial-box');
  if (existingBox) existingBox.remove();
  const existingBtns = container.querySelector('.btn-group');
  if (existingBtns) existingBtns.remove();

  const box = document.createElement('div');
  box.className = 'tutorial-box fade-in';
  let html = `<div class="tut-title">${tut.title}</div>`;
  html += `<div class="tut-progress">共 ${tut.steps.length} 步</div>`;
  tut.steps.forEach((s, i) => {
    html += `<div class="step"><div class="step-num">${i + 1}</div><div class="step-content"><div class="step-text">${s.text}</div>`;
    if (s.example) html += `<div class="example-block">${s.example.replace(/\n/g, '<br>').replace(/→/g, '<span class="arrow">→</span>').replace(/✓/g, '<span class="check">✓</span>')}</div>`;
    if (s.formula) html += `<div class="formula-block">${s.formula.replace(/\n/g, '<br>')}</div>`;
    html += `</div></div>`;
  });
  box.innerHTML = html;
  // Insert before animContainer
  const animContainer = document.getElementById('animContainer');
  container.insertBefore(box, animContainer);

  const btnGroup = document.createElement('div');
  btnGroup.className = 'btn-group';
  btnGroup.style.marginTop = '20px';
  const startBtn = document.createElement('button');
  startBtn.className = 'btn btn-success';
  startBtn.textContent = '我学会了，开始练习';
  startBtn.onclick = callback;
  btnGroup.appendChild(startBtn);
  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-sm';
  backBtn.textContent = '返回';
  backBtn.onclick = () => { stopAnimation(); showScreen('levelSelectScreen'); };
  btnGroup.appendChild(backBtn);
  container.appendChild(btnGroup);

  // Setup animation
  currentAnimMode = mode;
  animPhase = 0;
  if (mode && ['multiplication','determinant','linearDep','inverse','eigenvalue','transpose','symmetry','rank','equation','elementary'].includes(mode)) {
    animContainer.style.display = 'block';
    setupAnimCanvas();
    resetAnimation();
  } else {
    animContainer.style.display = 'none';
  }

  showScreen('tutorialScreen');
}

// ==================== GAME LOGIC ====================
function startLevel(catKey, lvl) {
  state.currentCategory = catKey;
  state.currentLevel = lvl;
  state.isTutorial = (catKey === 'tutorial');
  state.score = 0;
  state.combo = 0;
  state.maxCombo = 0;
  state.questionIndex = 0;
  state.correctCount = 0;
  state.hintsUsed = 0;
  state.totalQuestions = state.isTutorial ? 3 : 5;
  state.answers = [];
  state.answered = false;

  if (state.isTutorial) {
    showTutorial(state.currentMode, () => beginGame());
  } else {
    beginGame();
  }
}

function beginGame() {
  state.questions = generateQuestions(state.currentMode, state.currentCategory, state.totalQuestions);
  state.startTime = Date.now();
  state.elapsed = 0;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(updateTimer, 1000);
  // Restore progress bar visibility (may have been hidden in arcade mode)
  const pb = document.querySelector('.progress-bar');
  if (pb) pb.style.display = '';
  showScreen('gameScreen');
  renderRules();
  renderQuestion();
}

function updateTimer() {
  state.elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  document.getElementById('hudTime').textContent = state.elapsed + 's';
}

function renderRules() {
  const mode = state.currentMode;
  const rc = document.getElementById('rulesContent');
  const tut = tutorials[mode];
  let html = '';
  tut.steps.forEach(s => {
    html += `<p>${s.text}</p>`;
    if (s.formula) html += `<p class="formula">${s.formula.replace(/\n/g, '  |  ')}</p>`;
  });
  rc.innerHTML = html;
}

function toggleRules() {
  const c = document.getElementById('rulesContent');
  const a = document.getElementById('rulesArrow');
  c.classList.toggle('open');
  a.textContent = c.classList.contains('open') ? '▲' : '▼';
}

function generateQuestions(mode, cat, count) {
  const qs = [];
  for (let i = 0; i < count; i++) {
    qs.push(generateOneQuestion(mode, cat));
  }
  return qs;
}

function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function generateOneQuestion(mode, cat) {
  switch(mode) {
    case 'multiplication': return genMultiplication(cat);
    case 'determinant': return genDeterminant(cat);
    case 'linearDep': return genLinearDep(cat);
    case 'inverse': return genInverse(cat);
    case 'eigenvalue': return genEigenvalue(cat);
    case 'transpose': return genTranspose(cat);
    case 'symmetry': return genSymmetry(cat);
    case 'rank': return genRank(cat);
    case 'equation': return genEquation(cat);
    case 'elementary': return genElementary(cat);
  }
}

// --- Matrix Multiplication ---
function matMul(A, B) {
  const m = A.length, n = B[0].length, p = B.length;
  const C = [];
  for (let i = 0; i < m; i++) {
    C[i] = [];
    for (let j = 0; j < n; j++) {
      let s = 0;
      for (let k = 0; k < p; k++) s += A[i][k] * B[k][j];
      C[i][j] = s;
    }
  }
  return C;
}

function genMultiplication(cat) {
  let A, B, C;
  let attempts = 0;
  do {
    if (cat === 'tutorial' || cat === 'beginner') {
      A = [[randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3)]];
      B = [[randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3)]];
    } else if (cat === 'intermediate') {
      if (Math.random() < 0.5) {
        A = [[randInt(-3,3), randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3), randInt(-3,3)]];
        B = [[randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3)]];
      } else {
        A = [[randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3)]];
        B = [[randInt(-3,3), randInt(-3,3), randInt(-3,3)],[randInt(-3,3), randInt(-3,3), randInt(-3,3)]];
      }
    } else {
      A = [[randInt(-4,4), randInt(-4,4), randInt(-4,4)],[randInt(-4,4), randInt(-4,4), randInt(-4,4)],[randInt(-4,4), randInt(-4,4), randInt(-4,4)]];
      B = [[randInt(-4,4), randInt(-4,4), randInt(-4,4)],[randInt(-4,4), randInt(-4,4), randInt(-4,4)],[randInt(-4,4), randInt(-4,4), randInt(-4,4)]];
    }
    C = matMul(A, B);
    attempts++;
  } while (attempts < 50 && C.flat().some(v => Math.abs(v) > 100));
  return { type: 'multiplication', A, B, answer: C };
}

// --- Determinant ---
function det2(a, b, c, d) { return a * d - b * c; }
function det3(M) {
  return M[0][0]*(M[1][1]*M[2][2]-M[1][2]*M[2][1])
       - M[0][1]*(M[1][0]*M[2][2]-M[1][2]*M[2][0])
       + M[0][2]*(M[1][0]*M[2][1]-M[1][1]*M[2][0]);
}

function genDeterminant(cat) {
  let M, d;
  let attempts = 0;
  do {
    if (cat === 'tutorial' || cat === 'beginner') {
      M = [[randInt(-5,5), randInt(-5,5)],[randInt(-5,5), randInt(-5,5)]];
      d = det2(M[0][0], M[0][1], M[1][0], M[1][1]);
    } else {
      const maxVal = cat === 'intermediate' ? 3 : 5;
      M = [[randInt(-maxVal,maxVal), randInt(-maxVal,maxVal), randInt(-maxVal,maxVal)],
           [randInt(-maxVal,maxVal), randInt(-maxVal,maxVal), randInt(-maxVal,maxVal)],
           [randInt(-maxVal,maxVal), randInt(-maxVal,maxVal), randInt(-maxVal,maxVal)]];
      d = det3(M);
    }
    attempts++;
  } while (attempts < 100 && (d < -50 || d > 50));
  return { type: 'determinant', matrix: M, answer: d };
}

// --- Linear Dependence ---
function genLinearDep(cat) {
  const isDep = Math.random() < 0.5;
  let vectors;
  if (cat === 'tutorial' || cat === 'beginner') {
    const v1 = [randInt(-5,5), randInt(-5,5)];
    let v2;
    if (isDep) {
      let k = randInt(-3,3);
      if (k === 0) k = 1;
      v2 = [v1[0]*k, v1[1]*k];
      if (v2[0]===0 && v2[1]===0) v2 = [v1[0]*2, v1[1]*2];
    } else {
      do { v2 = [randInt(-5,5), randInt(-5,5)]; } while (v1[0]*v2[1] === v1[1]*v2[0]);
    }
    vectors = [v1, v2];
  } else if (cat === 'intermediate') {
    const v1 = [randInt(-4,4), randInt(-4,4)];
    const v2 = [randInt(-4,4), randInt(-4,4)];
    let v3;
    if (isDep) {
      const k1 = randInt(-2,2), k2 = randInt(-2,2);
      if (k1===0 && k2===0) { v3 = [v1[0]+v2[0], v1[1]+v2[1]]; }
      else { v3 = [v1[0]*k1+v2[0]*k2, v1[1]*k1+v2[1]*k2]; }
    } else {
      v3 = [v1[0]*randInt(-2,2)+v2[0]*randInt(-2,2), v1[1]*randInt(-2,2)+v2[1]*randInt(-2,2)];
    }
    vectors = [v1, v2, v3];
  } else {
    // advanced: 3 vectors in 3D
    const v1 = [randInt(-3,3), randInt(-3,3), randInt(-3,3)];
    const v2 = [randInt(-3,3), randInt(-3,3), randInt(-3,3)];
    let v3;
    if (isDep) {
      const k1 = randChoice([-2,-1,1,2]), k2 = randChoice([-2,-1,1,2]);
      v3 = [v1[0]*k1+v2[0]*k2, v1[1]*k1+v2[1]*k2, v1[2]*k1+v2[2]*k2];
    } else {
      // Generate v3 not in span of v1,v2
      // Cross product of v1,v2 gives a vector not in their span (if v1,v2 are independent)
      do {
        v3 = [randInt(-3,3), randInt(-3,3), randInt(-3,3)];
      } while (isDep3D(v1, v2, v3));
    }
    vectors = [v1, v2, v3];
  }
  // For intermediate (3 vectors in 2D), always dependent
  let actualIsDep = isDep;
  if (cat === 'intermediate') actualIsDep = true; // 3 vectors in 2D always dependent
  return { type: 'linearDep', vectors, answer: actualIsDep };
}

function isDep3D(v1, v2, v3) {
  // Check if v3 is in span of v1, v2 by checking determinant of [v1 v2 v3]
  const d = v1[0]*(v2[1]*v3[2]-v2[2]*v3[1]) - v1[1]*(v2[0]*v3[2]-v2[2]*v3[0]) + v1[2]*(v2[0]*v3[1]-v2[1]*v3[0]);
  return d === 0;
}

// --- Matrix Inverse ---
function inv2(M) {
  const d = det2(M[0][0], M[0][1], M[1][0], M[1][1]);
  if (d === 0) return null;
  return [[M[1][1]/d, -M[0][1]/d], [-M[1][0]/d, M[0][0]/d]];
}

function inv3(M) {
  const d = det3(M);
  if (d === 0) return null;
  const adj = [
    [M[1][1]*M[2][2]-M[1][2]*M[2][1], M[0][2]*M[2][1]-M[0][1]*M[2][2], M[0][1]*M[1][2]-M[0][2]*M[1][1]],
    [M[1][2]*M[2][0]-M[1][0]*M[2][2], M[0][0]*M[2][2]-M[0][2]*M[2][0], M[0][2]*M[1][0]-M[0][0]*M[1][2]],
    [M[1][0]*M[2][1]-M[1][1]*M[2][0], M[0][1]*M[2][0]-M[0][0]*M[2][1], M[0][0]*M[1][1]-M[0][1]*M[1][0]]
  ];
  return adj.map(row => row.map(v => v / d));
}

function genInverse(cat) {
  let M, inv;
  let attempts = 0;
  do {
    if (cat === 'tutorial' || cat === 'beginner') {
      // det = ±1, ±2
      const targetDet = randChoice([-2,-1,1,2]);
      // Generate simple matrix with known det
      let a, b, c, d;
      do {
        a = randInt(-3,3); b = randInt(-3,3); c = randInt(-3,3); d = randInt(-3,3);
      } while (det2(a,b,c,d) !== targetDet);
      M = [[a,b],[c,d]];
      inv = inv2(M);
    } else if (cat === 'intermediate') {
      let a, b, c, d;
      do {
        a = randInt(-5,5); b = randInt(-5,5); c = randInt(-5,5); d = randInt(-5,5);
      } while (det2(a,b,c,d) === 0);
      M = [[a,b],[c,d]];
      inv = inv2(M);
    } else {
      // 3x3 with small values
      do {
        M = [[randInt(-3,3),randInt(-3,3),randInt(-3,3)],[randInt(-3,3),randInt(-3,3),randInt(-3,3)],[randInt(-3,3),randInt(-3,3),randInt(-3,3)]];
        inv = inv3(M);
      } while (!inv || inv.flat().some(v => !isFinite(v) || Math.abs(v) > 50));
    }
    attempts++;
  } while (attempts < 200 && (!inv || inv.flat().some(v => !isFinite(v))));
  // Round to reasonable precision
  const roundedInv = inv.map(row => row.map(v => Math.round(v * 1000) / 1000));
  return { type: 'inverse', matrix: M, answer: roundedInv, det: cat === 'advanced' ? det3(M) : det2(M[0][0],M[0][1],M[1][0],M[1][1]) };
}

// --- Eigenvalue ---
function genEigenvalue(cat) {
  let a, b, c, d, trace, det, disc, l1, l2;
  let attempts = 0;
  do {
    if (cat === 'tutorial' || cat === 'beginner') {
      // Integer eigenvalues
      l1 = randInt(-5,5); l2 = randInt(-5,5);
      trace = l1 + l2;
      det = l1 * l2;
      // A = [[a,b],[c,d]] with a+d=trace, ad-bc=det
      // Pick a, then d=trace-a, pick b, then c=(a*d-det)/b
      a = randInt(-3,3);
      d = trace - a;
      b = randChoice([-2,-1,1,2]);
      const bcVal = a * d - det;
      if (bcVal % b !== 0) { attempts++; continue; }
      c = bcVal / b;
      if (Math.abs(c) > 5) { attempts++; continue; }
    } else {
      // 1 decimal eigenvalues
      l1 = Math.round((randInt(-30,30) / 2) * 10) / 10;
      l2 = Math.round((randInt(-30,30) / 2) * 10) / 10;
      trace = Math.round((l1 + l2) * 10) / 10;
      det = Math.round(l1 * l2 * 10) / 10;
      a = randInt(-4,4);
      d = Math.round((trace - a) * 10) / 10;
      b = randChoice([-2,-1,1,2]);
      const bcVal2 = Math.round((a * d - det) * 10) / 10;
      if (Math.abs(bcVal2 / b) > 5 || Math.round(bcVal2) % b !== 0) { attempts++; continue; }
      c = Math.round(bcVal2) / b;
    }
    attempts++;
  } while (attempts < 200 && (Math.abs(c) > 5 || !isFinite(c)));

  if (attempts >= 200) {
    // Fallback: simple integer eigenvalues
    l1 = 1; l2 = 2; trace = 3; det = 2;
    a = 1; d = 2; b = 1; c = 0;
  }

  const matrix = [[a,b],[c,d]];
  // Sort eigenvalues
  const eigenvalues = [Math.min(l1,l2), Math.max(l1,l2)];
  // Round for display
  const roundedEigenvalues = eigenvalues.map(v => Math.round(v * 10) / 10);
  return { type: 'eigenvalue', matrix, trace, det, answer: roundedEigenvalues };
}

// --- Matrix Transpose ---
function genTranspose(cat) {
  let rows, cols, valRange;
  if (cat === 'tutorial' || cat === 'beginner') {
    rows = 2; cols = 3; valRange = 5;
  } else if (cat === 'intermediate') {
    rows = 3; cols = 3; valRange = 5;
  } else {
    rows = 3; cols = 4; valRange = 5;
  }

  const matrix = [];
  for (let i = 0; i < rows; i++) {
    matrix[i] = [];
    for (let j = 0; j < cols; j++) {
      matrix[i][j] = randInt(-valRange, valRange);
    }
  }

  // Compute transpose
  const result = [];
  for (let j = 0; j < cols; j++) {
    result[j] = [];
    for (let i = 0; i < rows; i++) {
      result[j][i] = matrix[i][j];
    }
  }

  return { type: 'transpose', matrix, answer: result, resultRows: cols, resultCols: rows };
}

// --- Matrix Symmetry ---
function genSymmetry(cat) {
  let size, valRange;
  if (cat === 'arcade') {
    // Arcade mode: use state.difficulty directly
    if (state.difficulty <= 2) { size = 2; valRange = 3; }
    else if (state.difficulty <= 4) { size = 3; valRange = 3; }
    else if (state.difficulty <= 6) { size = 3; valRange = 5; }
    else { size = 4; valRange = 4; }
  } else {
    size = cat === 'tutorial' ? 2 : cat === 'beginner' ? 2 : cat === 'intermediate' ? 3 : 3;
    valRange = cat === 'advanced' ? 5 : 3;
  }

  // 随机决定类型：对称(40%)、反对称(30%)、非对称(30%)
  const rand = Math.random();
  let matrix, answer;

  if (rand < 0.4) {
    // 对称矩阵
    answer = 'symmetric';
    matrix = [];
    for (let i = 0; i < size; i++) {
      matrix[i] = [];
      for (let j = 0; j < size; j++) {
        if (i === j) matrix[i][j] = Math.floor(Math.random() * valRange * 2) - valRange;
        else if (j > i) {
          const v = Math.floor(Math.random() * valRange * 2) - valRange;
          matrix[i][j] = v;
          matrix[j][i] = v;
        }
      }
    }
  } else if (rand < 0.7) {
    // 反对称矩阵
    answer = 'skew-symmetric';
    matrix = [];
    for (let i = 0; i < size; i++) {
      matrix[i] = [];
      for (let j = 0; j < size; j++) {
        if (i === j) matrix[i][j] = 0;
        else if (j > i) {
          const v = Math.floor(Math.random() * valRange) + 1;
          matrix[i][j] = v;
          matrix[j][i] = -v;
        }
      }
    }
  } else {
    // 非对称矩阵
    answer = 'asymmetric';
    matrix = [];
    for (let i = 0; i < size; i++) {
      matrix[i] = [];
      for (let j = 0; j < size; j++) {
        matrix[i][j] = Math.floor(Math.random() * valRange * 2) - valRange;
      }
    }
    // 确保不是对称也不是反对称
    let isSym = true, isSkew = true;
    for (let i = 0; i < size && (isSym || isSkew); i++) {
      for (let j = 0; j < size && (isSym || isSkew); j++) {
        if (matrix[i][j] !== matrix[j][i]) isSym = false;
        if (i !== j && matrix[i][j] !== -matrix[j][i]) isSkew = false;
      }
    }
    if (isSym || isSkew) {
      // 修改一个元素使其非对称
      matrix[0][1] = matrix[0][1] + 1;
      answer = 'asymmetric';
    }
  }

  return { type: 'symmetry', matrix, answer, size };
}

// --- Matrix Rank ---
function genRank(cat) {
  let rows, cols, valRange, targetRank;

  if (cat === 'tutorial') { rows = 2; cols = 3; valRange = 2; targetRank = 1; }
  else if (cat === 'beginner') { rows = 2; cols = 3; valRange = 3; targetRank = Math.random() < 0.5 ? 1 : 2; }
  else if (cat === 'intermediate') { rows = 3; cols = 3; valRange = 3; targetRank = Math.floor(Math.random() * 3) + 1; }
  else { rows = 3; cols = 4; valRange = 4; targetRank = Math.floor(Math.random() * 3) + 1; }

  // 生成指定秩的矩阵
  // 方法：先生成 targetRank 个线性无关的行，其余行是它们的线性组合
  const baseRows = [];
  for (let i = 0; i < targetRank; i++) {
    const row = [];
    for (let j = 0; j < cols; j++) {
      row.push(Math.floor(Math.random() * valRange * 2) - valRange);
    }
    baseRows.push(row);
  }

  const matrix = [...baseRows];
  for (let i = targetRank; i < rows; i++) {
    // 生成 baseRows 的随机线性组合
    const coeffs = [];
    for (let j = 0; j < targetRank; j++) {
      coeffs.push(Math.floor(Math.random() * 3) - 1); // -1, 0, 1
    }
    const row = [];
    for (let j = 0; j < cols; j++) {
      let val = 0;
      for (let k = 0; k < targetRank; k++) val += coeffs[k] * baseRows[k][j];
      row.push(val);
    }
    matrix.push(row);
  }

  // 打乱行顺序
  matrix.sort(() => Math.random() - 0.5);

  return { type: 'rank', matrix, answer: targetRank, rows, cols };
}

function createMatrixHTML(M, inputCells, cellClass) {
  const rows = M.length, cols = M[0].length;
  let html = `<div class="matrix-display" style="grid-template-columns:repeat(${cols},1fr)">`;
  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
      const isInput = inputCells && inputCells[i] && inputCells[i][j];
      const cls = isInput ? `matrix-cell input-cell ${cellClass||''}` : 'matrix-cell';
      if (isInput) {
        html += `<div class="${cls}"><input type="text" data-r="${i}" data-c="${j}" autocomplete="off"></div>`;
      } else {
        html += `<div class="${cls}">${M[i][j]}</div>`;
      }
    }
  }
  html += '</div>';
  return html;
}

function setupInputNavigation(area) {
  const inputs = area.querySelectorAll('input[data-r]');
  inputs.forEach((inp, idx) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === 'Tab') {
        e.preventDefault();
        const next = inputs[idx + 1];
        if (next) next.focus();
        else {
          // Submit
          const q = state.questions[state.questionIndex];
          if (q.type === 'multiplication') checkMultiplication();
          else if (q.type === 'inverse') checkInverse();
          else if (q.type === 'transpose') checkTranspose();
          else if (q.type === 'equation') checkEquation();
          else if (q.type === 'elementary') checkElementary();
        }
      }
    });
  });
}

// ==================== CHECK ANSWERS ====================
function checkMatrixInputs(q, tolerance, showAnswer) {
  const inputs = document.querySelectorAll('#gameArea input[data-r]');
  let allCorrect = true;
  let correctCount = 0;
  inputs.forEach(inp => {
    const r = parseInt(inp.dataset.r), c = parseInt(inp.dataset.c);
    const val = parseFloat(inp.value);
    const correct = q.answer[r][c];
    const cell = inp.parentElement;
    if (isNaN(val) || Math.abs(val - correct) > tolerance) {
      allCorrect = false;
      cell.classList.add('wrong');
      if (showAnswer) inp.value = correct;
    } else {
      cell.classList.add('correct');
      correctCount++;
    }
    inp.disabled = true;
  });
  return { allCorrect, correctCount, total: inputs.length };
}

function checkMultiplication() {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  const { allCorrect } = checkMatrixInputs(q, 0.01, false);
  state.answered = true;
  processAnswer(allCorrect, q);
}

function checkSymmetry(userAnswer) {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  const correct = (userAnswer === q.answer);
  const btns = document.querySelectorAll('.judgment-btn');
  btns.forEach(b => b.style.pointerEvents = 'none');
  const answerMap = { 'symmetric': 0, 'skew-symmetric': 1, 'asymmetric': 2 };
  const userIdx = answerMap[userAnswer];
  const correctIdx = answerMap[q.answer];
  if (correct) {
    btns[userIdx].classList.add('selected-correct');
  } else {
    btns[userIdx].classList.add('selected-wrong');
    btns[correctIdx].classList.add('selected-correct');
  }
  state.answered = true;
  processAnswer(correct, q);
}

function checkRank() {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  const inp = document.getElementById('rankInput');
  const val = parseInt(inp.value);
  const correct = val === q.answer;
  inp.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    inp.value = q.answer;
    inp.classList.add('wrong');

  state.answered = true;
  processAnswer(correct, q);
}

function checkTranspose() {
  if (state.answered) return;
  const q = state.questions[state.questionIndex];
  const { allCorrect } = checkMatrixInputs(q, 0.5, true);
  state.answered = true;
  processAnswer(allCorrect, q);
}

function processAnswer(correct, q) {
  const isArcade = state.currentCategory === 'arcade';

  if (correct) {
    state.combo++;
    state.correctCount++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;

    if (isArcade) {
      // Arcade scoring: 10 * difficulty + combo bonus
      const points = 10 * state.difficulty + state.combo * 5;
      state.score += points;
      state.arcadeScore = state.score;

      // Check difficulty increase: every 5 correct answers
      if (state.correctCount % 5 === 0) {
        state.difficulty++;
        if (state.difficulty > state.maxDifficulty) state.maxDifficulty = state.difficulty;
      }
    } else {
      const timeBonus = Math.max(0, 5 - Math.floor((Date.now() - state.questionStartTime) / 1000));
      const comboMultiplier = 1 + (state.combo - 1) * 0.2;
      const points = Math.round((10 + timeBonus) * comboMultiplier);
      state.score += points;
    }
    spawnParticles(true);
    if (state.combo >= 3) showComboGlow(state.combo);
  } else {
    state.combo = 0;
    spawnShockwave();

    if (isArcade) {
      state.lives--;
      if (state.lives <= 0) {
        // Game over
        state.answered = true;
        // Update HUD to show 0 lives
        const livesEl = document.getElementById('hudLives');
        if (livesEl) livesEl.innerHTML = '🖤🖤🖤';
        document.getElementById('hudScore').textContent = state.score;
        document.getElementById('hudCombo').textContent = state.combo;
        setTimeout(() => endGame(), 1500);
        return;
      }
    }
  }

  // Update HUD
  const scoreEl = document.getElementById('hudScore');
  const comboEl = document.getElementById('hudCombo');
  if (scoreEl) scoreEl.textContent = state.score;
  if (comboEl) comboEl.textContent = state.combo;

  // Update lives display in arcade mode
  if (isArcade) {
    const livesEl = document.getElementById('hudLives');
    if (livesEl) livesEl.innerHTML = '❤️'.repeat(state.lives) + '🖤'.repeat(3 - state.lives);
    const diffEl = document.getElementById('hudDifficulty');
    if (diffEl) diffEl.textContent = 'Lv.' + state.difficulty;
  }

  // Disable hint button
  document.getElementById('hintBtn').style.display = 'none';

  // Next question or result
  setTimeout(() => {
    state.questionIndex++;
    if (isArcade) {
      // Arcade: generate next question (infinite mode)
      if (state.lives > 0) {
        generateNextArcadeQuestion();
        renderQuestion();
      }
    } else if (state.questionIndex >= state.totalQuestions) {
      endGame();
    } else {
      renderQuestion();
    }
  }, correct ? 800 : 1500);
}

function useHint() {
  if (state.answered) return;
  state.hintsUsed++;
  state.score = Math.max(0, state.score - 5);
  document.getElementById('hudScore').textContent = state.score;

  const q = state.questions[state.questionIndex];
  switch(q.type) {
    case 'multiplication': case 'inverse': case 'transpose': case 'elementary': {
      const inputs = document.querySelectorAll('#gameArea input[data-r]');
      const unfilled = [...inputs].filter(inp => !inp.value && inp.parentElement && !inp.parentElement.classList.contains('revealed'));
      if (unfilled.length > 0) {
        const cell = unfilled[Math.floor(Math.random() * unfilled.length)];
        const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
        cell.value = q.answer[r][c];
        cell.parentElement.classList.add('revealed');
        cell.disabled = true;
      }
      break;
    }
    case 'determinant': {
      const inp = document.getElementById('detInput');
      if (inp.value === '') {
        inp.value = q.answer;
        inp.parentElement && inp.classList.add('revealed');
        inp.disabled = true;
        state.answered = true;
        processAnswer(true, q);
      }
      break;
    }
    case 'eigenvalue': {
      const e1 = document.getElementById('eigen1');
      const e2 = document.getElementById('eigen2');
      if (e1.value === '') { e1.value = q.answer[0]; e1.classList.add('revealed'); e1.disabled = true; }
      else if (e2.value === '') { e2.value = q.answer[1]; e2.classList.add('revealed'); e2.disabled = true; }
      break;
    }
    case 'linearDep': {
      // For linear dep, hint just tells the answer
      const btns = document.querySelectorAll('.judgment-btn');
      btns.forEach(b => b.style.pointerEvents = 'none');
      btns[q.answer ? 0 : 1].style.boxShadow = `0 0 15px ${q.answer ? 'var(--error)' : 'var(--success)'}`;
      break;
    }
    case 'symmetry': {
      const btns = document.querySelectorAll('.judgment-btn');
      btns.forEach(b => b.style.pointerEvents = 'none');
      const answerMap = { 'symmetric': 0, 'skew-symmetric': 1, 'asymmetric': 2 };
      const correctIdx = answerMap[q.answer];
      btns[correctIdx].style.boxShadow = '0 0 15px var(--success)';
      break;
    }
    case 'rank': {
      const inp = document.getElementById('rankInput');
      if (inp.value === '') {
        inp.value = q.answer;
        inp.classList.add('revealed');
        inp.disabled = true;
        state.answered = true;
        processAnswer(true, q);
      }
      break;
    }
    case 'equation': {
      const inputs = document.querySelectorAll('#gameArea input[data-r]');
      const unfilled = [...inputs].filter(i => i.value === '');
      if (unfilled.length > 0) {
        const cell = unfilled[Math.floor(Math.random() * unfilled.length)];
        const idx = parseInt(cell.dataset.r);
        cell.value = q.answer[idx];
        cell.classList.add('revealed');
        cell.disabled = true;
      }
      break;
    }
  }
}

// ==================== END GAME ====================
function endGame() {
  clearInterval(state.timerInterval);
  const isArcade = state.currentCategory === 'arcade';

  if (isArcade) {
    // Arcade mode: save high score, show arcade result
    const finalScore = setArcadeHighScore(state.currentMode, state.score);
    const isNewRecord = state.score >= finalScore && state.score > 0;
    showTransition('游戏结束！', isNewRecord ? '新纪录！' : '再来一局！', () => {
      showArcadeResult(finalScore, isNewRecord);
    });
    if (isNewRecord) spawnConfetti();
    return;
  }

  document.getElementById('progressFill').style.width = '100%';

  // Calculate stars
  const accuracy = state.correctCount / state.totalQuestions;
  let stars = 0;
  if (accuracy >= 0.9) stars = 3;
  else if (accuracy >= 0.6) stars = 2;
  else if (accuracy >= 0.3) stars = 1;

  // Save progress
  if (!state.isTutorial) {
    setStars(state.currentMode, state.currentCategory, state.currentLevel, stars);
  } else {
    setStars(state.currentMode, 'tutorial', 0, Math.max(stars, 1));
  }

  // Show transition
  showTransition(stars >= 2 ? '关卡通过！' : '继续加油！', stars >= 2 ? '表现出色！' : '多练习就能进步', () => {
    showResult(stars);
  });

  if (stars >= 2) spawnConfetti();
}
